syntax = "proto3";

package eve.trade_settlement.v1;

import "buf/validate/validate.proto";
import "eve/validation/v1/validation_rules.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/QuasarRay/eve-trade/proto/gen/eve/trade_settlement/v1;tradesettlementv1";

service TradeSettlementService {
  rpc ExecuteSettlementBatch(ExecuteSettlementBatchRequest) returns (ExecuteSettlementBatchResponse);
  rpc QueueSettlementOperation(QueueSettlementOperationRequest) returns (QueueSettlementOperationResponse);
  rpc GetSettlementOperation(GetSettlementOperationRequest) returns (GetSettlementOperationResponse);
  rpc UpdateSettlementOperation(UpdateSettlementOperationRequest) returns (UpdateSettlementOperationResponse);
  rpc ClaimSettlementOutbox(ClaimSettlementOutboxRequest) returns (ClaimSettlementOutboxResponse);
  rpc CompleteSettlementOutbox(CompleteSettlementOutboxRequest) returns (CompleteSettlementOutboxResponse);
  rpc ReleaseSettlementOutbox(ReleaseSettlementOutboxRequest) returns (ReleaseSettlementOutboxResponse);
}

message ExecuteSettlementBatchRequest {
  string idempotency_key = 1 [(buf.validate.field).string.(eve.validation.v1.non_blank_string) = true];
  string request_fingerprint = 2;
  string external_request_id = 3;
  optional int64 caused_by_capsuleer_id = 4 [(buf.validate.field).int64.(eve.validation.v1.positive_int64) = true];
  repeated SettlementOperation operations = 5 [(buf.validate.field).repeated.min_items = 1];
  string created_by_service = 6 [(buf.validate.field).string.(eve.validation.v1.non_blank_string) = true];
  string request_id = 7 [(buf.validate.field).string.(eve.validation.v1.optional_uuid_string) = true];
  SettlementIntent intent = 8 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
}

enum SettlementIntent {
  SETTLEMENT_INTENT_UNSPECIFIED = 0;
  SETTLEMENT_INTENT_ISSUE = 1;
  SETTLEMENT_INTENT_ACCEPT = 2;
  SETTLEMENT_INTENT_CANCEL = 3;
}

enum SettlementOperationState {
  SETTLEMENT_OPERATION_STATE_UNSPECIFIED = 0;
  SETTLEMENT_OPERATION_STATE_QUEUED = 1;
  SETTLEMENT_OPERATION_STATE_PROCESSING = 2;
  SETTLEMENT_OPERATION_STATE_SUCCEEDED = 3;
  SETTLEMENT_OPERATION_STATE_FAILED = 4;
  SETTLEMENT_OPERATION_STATE_CANCELLED = 5;
  SETTLEMENT_OPERATION_STATE_EXPIRED = 6;
}

message QueueSettlementOperationRequest {
  string idempotency_key = 1 [(buf.validate.field).string.(eve.validation.v1.non_blank_string) = true];
  string request_fingerprint = 2 [(buf.validate.field).string.(eve.validation.v1.non_blank_string) = true];
  SettlementIntent intent = 3 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  int64 caused_by_capsuleer_id = 4 [(buf.validate.field).int64.(eve.validation.v1.positive_int64) = true];
  string external_request_id = 5;
  bytes work_payload_json = 6 [(buf.validate.field).bytes.min_len = 2];
}

message GetSettlementOperationRequest {
  string operation_id = 1 [(buf.validate.field).string.(eve.validation.v1.uuid_string) = true];
}

message UpdateSettlementOperationRequest {
  string operation_id = 1 [(buf.validate.field).string.(eve.validation.v1.uuid_string) = true];
  SettlementOperationState state = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  string settlement_batch_id = 3 [(buf.validate.field).string.(eve.validation.v1.optional_uuid_string) = true];
  string failure_code = 4;
  string failure_description = 5;
  bool result_published = 6;
  string lease_owner = 7;
  uint64 lease_generation = 8;
  google.protobuf.Timestamp lease_expires_at = 9;
}

message SettlementOperationStatus {
  string operation_id = 1;
  string idempotency_key = 2;
  string request_fingerprint = 3;
  SettlementIntent intent = 4;
  int64 caused_by_capsuleer_id = 5;
  SettlementOperationState state = 6;
  google.protobuf.Timestamp queued_at = 7;
  google.protobuf.Timestamp updated_at = 8;
  string settlement_batch_id = 9;
  string failure_code = 10;
  string failure_description = 11;
  bool result_published = 12;
  string lease_owner = 13;
  uint64 lease_generation = 14;
  google.protobuf.Timestamp lease_expires_at = 15;
}

message QueueSettlementOperationResponse {
  SettlementOperationStatus operation = 1;
}

message GetSettlementOperationResponse {
  SettlementOperationStatus operation = 1;
}

message UpdateSettlementOperationResponse {
  SettlementOperationStatus operation = 1;
}

message ClaimSettlementOutboxRequest {
  string worker_id = 1 [(buf.validate.field).string.(eve.validation.v1.non_blank_string) = true];
  uint32 limit = 2;
  uint32 lease_seconds = 3;
}

message SettlementOutboxDelivery {
  string operation_id = 1;
  bytes work_payload_json = 2;
  uint32 attempt_count = 3;
  uint64 lease_generation = 4;
}

message ClaimSettlementOutboxResponse {
  repeated SettlementOutboxDelivery deliveries = 1;
}

message CompleteSettlementOutboxRequest {
  string operation_id = 1 [(buf.validate.field).string.(eve.validation.v1.uuid_string) = true];
  string worker_id = 2 [(buf.validate.field).string.(eve.validation.v1.non_blank_string) = true];
  uint64 lease_generation = 3;
  string message_id = 4 [(buf.validate.field).string.(eve.validation.v1.non_blank_string) = true];
}

message CompleteSettlementOutboxResponse {}

message ReleaseSettlementOutboxRequest {
  string operation_id = 1 [(buf.validate.field).string.(eve.validation.v1.uuid_string) = true];
  string worker_id = 2 [(buf.validate.field).string.(eve.validation.v1.non_blank_string) = true];
  uint64 lease_generation = 3;
  string error_description = 4;
}

message ReleaseSettlementOutboxResponse {}

message ExecuteSettlementBatchResponse {
  string settlement_batch_id = 1;
  string idempotency_key = 2;
  string batch_state = 3;
  bool idempotent_replay = 4;
  repeated SettlementStepResult step_results = 5;
}

message SettlementStepResult {
  uint32 step_index = 1;
  string settlement_step_id = 2;
  SettlementOperationKind step_kind = 3;
  repeated EntityReference outputs = 4;
}

message EntityReference {
  string entity_kind = 1 [(buf.validate.field).string.(eve.validation.v1.non_blank_string) = true];
  string entity_id = 2 [(buf.validate.field).string.(eve.validation.v1.uuid_string) = true];
}

enum SettlementOperationKind {
  SETTLEMENT_OPERATION_KIND_UNSPECIFIED = 0;
  SETTLEMENT_OPERATION_KIND_CREATE_NEW_TRADE_INSTANCE_ROW = 1;
  SETTLEMENT_OPERATION_KIND_MODIFY_TRADE_INSTANCE_STATE = 2;
  SETTLEMENT_OPERATION_KIND_CREATE_NEW_EMPTY_ITEM_STACK = 3;
  SETTLEMENT_OPERATION_KIND_TRANSFER_QUANTITY_FROM_ITEM_STACK_TO_ITEM_STACK_ESCROW = 4;
  SETTLEMENT_OPERATION_KIND_TRANSFER_QUANTITY_FROM_ITEM_STACK_ESCROW_TO_ITEM_STACK_WITH_NEW_OWNER = 5;
  SETTLEMENT_OPERATION_KIND_TRANSFER_QUANTITY_FROM_ITEM_STACK_ESCROW_TO_ITEM_STACK_WITH_PREVIOUS_OWNER = 6;
  SETTLEMENT_OPERATION_KIND_MERGE_ITEM_STACKS_WITH_IDENTICAL_ITEM_TYPE_AND_IDENTICAL_OWNER = 7;
  SETTLEMENT_OPERATION_KIND_CREATE_NEW_EMPTY_WALLET_ESCROW = 8;
  SETTLEMENT_OPERATION_KIND_TRANSFER_ISK_AMOUNT_FROM_WALLET_TO_WALLET_ESCROW = 9;
  SETTLEMENT_OPERATION_KIND_TRANSFER_ISK_AMOUNT_FROM_WALLET_ESCROW_TO_WALLET_WITH_NEW_OWNER = 10;
  SETTLEMENT_OPERATION_KIND_TRANSFER_ISK_AMOUNT_FROM_WALLET_ESCROW_TO_WALLET_WITH_PREVIOUS_OWNER = 11;
}

message SettlementOperation {
  oneof operation {
    option (buf.validate.oneof).required = true;

    CreateNewTradeInstanceRow create_new_trade_instance_row = 1;
    ModifyTradeInstanceState modify_trade_instance_state = 2;
    CreateNewEmptyItemStack create_new_empty_item_stack = 3;
    TransferQuantityFromItemStackToItemStackEscrow transfer_quantity_from_item_stack_to_item_stack_escrow = 4;
    TransferQuantityFromItemStackEscrowToItemStackWithNewOwner transfer_quantity_from_item_stack_escrow_to_item_stack_with_new_owner = 5;
    TransferQuantityFromItemStackEscrowToItemStackWithPreviousOwner transfer_quantity_from_item_stack_escrow_to_item_stack_with_previous_owner = 6;
    MergeItemStacksWithIdenticalItemTypeAndIdenticalOwner merge_item_stacks_with_identical_item_type_and_identical_owner = 7;
    CreateNewEmptyWalletEscrow create_new_empty_wallet_escrow = 8;
    TransferIskAmountFromWalletToWalletEscrow transfer_isk_amount_from_wallet_to_wallet_escrow = 9;
    TransferIskAmountFromWalletEscrowToWalletWithNewOwner transfer_isk_amount_from_wallet_escrow_to_wallet_with_new_owner = 10;
    TransferIskAmountFromWalletEscrowToWalletWithPreviousOwner transfer_isk_amount_from_wallet_escrow_to_wallet_with_previous_owner = 11;
  }
}

message CreateNewTradeInstanceRow {
  string trade_instance_id = 1 [(buf.validate.field).string.(eve.validation.v1.optional_uuid_string) = true];
  string trade_kind = 2 [(buf.validate.field).string.(eve.validation.v1.trade_kind_sell) = true];
  string trade_state = 3 [(buf.validate.field).string.(eve.validation.v1.trade_state_open) = true];
  int64 issuer_id = 4 [(buf.validate.field).int64.(eve.validation.v1.positive_int64) = true];
  int64 item_type_id = 5 [(buf.validate.field).int64.(eve.validation.v1.positive_int64) = true];
  int64 station_id = 6 [(buf.validate.field).int64.(eve.validation.v1.positive_int64) = true];
  int64 total_quantity = 7 [(buf.validate.field).int64.(eve.validation.v1.positive_int64) = true];
  int64 unit_price_isk = 8 [(buf.validate.field).int64.(eve.validation.v1.positive_int64) = true];
  google.protobuf.Timestamp expires_at = 9 [(buf.validate.field).timestamp.gt_now = true];
}

message ModifyTradeInstanceState {
  string trade_instance_id = 1 [(buf.validate.field).string.(eve.validation.v1.uuid_string) = true];
  string to_trade_state = 2 [(buf.validate.field).string.(eve.validation.v1.trade_state) = true];
  string trade_state_change_kind = 3 [(buf.validate.field).string.(eve.validation.v1.trade_state_change_kind) = true];
  string changed_by_service = 4 [(buf.validate.field).string.(eve.validation.v1.non_blank_string) = true];
}

message CreateNewEmptyItemStack {
  string item_stack_id = 1 [(buf.validate.field).string.(eve.validation.v1.optional_uuid_string) = true];
  int64 owner_id = 2 [(buf.validate.field).int64.(eve.validation.v1.positive_int64) = true];
  int64 item_type_id = 3 [(buf.validate.field).int64.(eve.validation.v1.positive_int64) = true];
  int64 station_id = 4 [(buf.validate.field).int64.(eve.validation.v1.positive_int64) = true];
}

message TransferQuantityFromItemStackToItemStackEscrow {
  string source_item_stack_id = 1 [(buf.validate.field).string.(eve.validation.v1.uuid_string) = true];
  string item_stack_escrow_id = 2 [(buf.validate.field).string.(eve.validation.v1.optional_uuid_string) = true];
  string trade_instance_id = 3 [(buf.validate.field).string.(eve.validation.v1.uuid_string) = true];
  int64 quantity = 4 [(buf.validate.field).int64.(eve.validation.v1.positive_int64) = true];
}

message TransferQuantityFromItemStackEscrowToItemStackWithNewOwner {
  string item_stack_escrow_id = 1 [(buf.validate.field).string.(eve.validation.v1.uuid_string) = true];
  string destination_item_stack_id = 2 [(buf.validate.field).string.(eve.validation.v1.uuid_string) = true];
  int64 quantity = 3 [(buf.validate.field).int64.(eve.validation.v1.positive_int64) = true];
}

message TransferQuantityFromItemStackEscrowToItemStackWithPreviousOwner {
  string item_stack_escrow_id = 1 [(buf.validate.field).string.(eve.validation.v1.uuid_string) = true];
  string destination_item_stack_id = 2 [(buf.validate.field).string.(eve.validation.v1.uuid_string) = true];
  int64 quantity = 3 [(buf.validate.field).int64.(eve.validation.v1.positive_int64) = true];
}

message MergeItemStacksWithIdenticalItemTypeAndIdenticalOwner {
  option (buf.validate.message).cel = {
    id: "merge_item_stacks.source_destination_distinct"
    message: "source_item_stack_id and destination_item_stack_id must differ"
    expression: "this.source_item_stack_id != this.destination_item_stack_id"
  };

  string source_item_stack_id = 1 [(buf.validate.field).string.(eve.validation.v1.uuid_string) = true];
  string destination_item_stack_id = 2 [(buf.validate.field).string.(eve.validation.v1.uuid_string) = true];
}

message CreateNewEmptyWalletEscrow {
  string wallet_escrow_id = 1 [(buf.validate.field).string.(eve.validation.v1.optional_uuid_string) = true];
  string trade_instance_id = 2 [(buf.validate.field).string.(eve.validation.v1.uuid_string) = true];
  int64 owner_id = 3 [(buf.validate.field).int64.(eve.validation.v1.positive_int64) = true];
  string source_wallet_id = 4 [(buf.validate.field).string.(eve.validation.v1.uuid_string) = true];
}

message TransferIskAmountFromWalletToWalletEscrow {
  string source_wallet_id = 1 [(buf.validate.field).string.(eve.validation.v1.uuid_string) = true];
  string wallet_escrow_id = 2 [(buf.validate.field).string.(eve.validation.v1.optional_uuid_string) = true];
  string trade_instance_id = 3 [(buf.validate.field).string.(eve.validation.v1.uuid_string) = true];
  int64 isk_amount = 4 [(buf.validate.field).int64.(eve.validation.v1.positive_int64) = true];
}

message TransferIskAmountFromWalletEscrowToWalletWithNewOwner {
  string wallet_escrow_id = 1 [(buf.validate.field).string.(eve.validation.v1.uuid_string) = true];
  string destination_wallet_id = 2 [(buf.validate.field).string.(eve.validation.v1.uuid_string) = true];
  int64 isk_amount = 3 [(buf.validate.field).int64.(eve.validation.v1.positive_int64) = true];
}

message TransferIskAmountFromWalletEscrowToWalletWithPreviousOwner {
  string wallet_escrow_id = 1 [(buf.validate.field).string.(eve.validation.v1.uuid_string) = true];
  string destination_wallet_id = 2 [(buf.validate.field).string.(eve.validation.v1.uuid_string) = true];
  int64 isk_amount = 3 [(buf.validate.field).int64.(eve.validation.v1.positive_int64) = true];
}
