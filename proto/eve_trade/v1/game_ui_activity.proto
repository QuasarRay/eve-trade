syntax = "proto3";

package eve_trade.v1;

import "eve_trade/v1/identity.proto";

option go_package = "github.com/QuasarRay/eve-trade/proto/gen/eve_trade/v1;evetradev1";
option java_multiple_files = true;
option java_package = "com.quasarray.evetrade.v1";

// This file models only raw game-server observations of trade-specific GUI
// activity. It intentionally contains no trade function names and no TradeState,
// so the game server cannot choose issue_trade_instance, settle_trade_instance,
// cancel_trade_instance, or any durable lifecycle state.

// GameTradeUiActivityKind describes what the capsuleer did in the visible trade
// UI. These are player-facing activities, not Market transaction function names.
enum GameTradeUiActivityKind {
  GAME_TRADE_UI_ACTIVITY_KIND_UNSPECIFIED = 0;
  GAME_TRADE_UI_ACTIVITY_KIND_ISSUE_BUTTON_PRESSED = 1;
  GAME_TRADE_UI_ACTIVITY_KIND_ACCEPT_BUTTON_PRESSED = 2;
  GAME_TRADE_UI_ACTIVITY_KIND_CANCEL_BUTTON_PRESSED = 3;
}

// GameTradeUiField is a raw field name/value pair from the game UI. Only the
// API Gateway may read these raw game conventions; Market Layer 2 never sees
// them.
message GameTradeUiField {
  string raw_game_field_name = 1;
  string raw_game_field_value = 2;
}

// GameTradeUiActivity is the only message the game server sends into the
// lifecycle. It reports activity and visible UI context; it does not specify
// trade type, transaction function name, database rows, or target TradeState.
message GameTradeUiActivity {
  GameUiActivityId activity_id = 1;
  GameServerId game_server_id = 2;
  GameSessionId game_session_id = 3;
  CapsuleerId capsuleer_id = 4;
  GameUiVersion game_ui_version = 5;
  GameTradeUiActivityKind activity_kind = 6;
  string raw_game_screen_name = 7;
  string raw_game_button_name = 8;
  repeated GameTradeUiField visible_fields = 9;
  int64 occurred_at_unix_millis = 10;
}

// GameTradeUiActivityResult is game-server-safe. It reports whether the UI
// activity entered the lifecycle and may include a player-safe reference/result,
// but it never exposes settlement row-selection metadata.
message GameTradeUiActivityResult {
  GameUiActivityId activity_id = 1;
  CorrelationId correlation_id = 2;
  string player_safe_status = 3;
  string player_safe_message = 4;
  string player_safe_trade_reference = 5;
}
