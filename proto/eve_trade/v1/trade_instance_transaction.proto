syntax = "proto3";

package eve_trade.v1;

import "eve_trade/v1/identity.proto";
import "eve_trade/v1/project_trade_interaction.proto";

option go_package = "github.com/QuasarRay/eve-trade/proto/gen/eve_trade/v1;evetradev1";
option java_multiple_files = true;
option java_package = "com.quasarray.evetrade.v1";

// This file defines the only transaction metadata Market Layer 2 is allowed to
// produce for the current lifecycle. The oneof field names are the function
// names: issue_trade_instance, settle_trade_instance, and cancel_trade_instance.
// There is no stringly-typed function-name field and no enum containing future
// functions, so services cannot drift into accepted, in_progress, standalone
// expire, or standalone fail cycles.

// TradeInstanceRowIdentities contains row identities selected by Market rules.
// Settlement uses these identities to find rows, but the transaction function
// implementation still decides which tables and columns it modifies.
message TradeInstanceRowIdentities {
  TradeInstanceId trade_instance_id = 1;
  CapsuleerId issuer_capsuleer_id = 2;
  repeated CapsuleerId counterparty_capsuleer_ids = 3;
  repeated WalletId wallet_ids = 4;
  repeated ItemStackId item_stack_ids = 5;
  repeated ItemInstanceId item_instance_ids = 6;
  TradeHubId trade_hub_id = 7;
  BrokerId broker_id = 8;
  WalletId escrow_wallet_id = 9;
}

// TradeAssetLine describes an item or ISK term chosen by Market rules. It is
// still not a database update instruction; settlement decides how to persist it.
message TradeAssetLine {
  ItemTypeId item_type_id = 1;
  ItemQuantity quantity = 2;
  IskAmount isk_amount = 3;
  repeated ItemStackId item_stack_ids = 4;
  repeated ItemInstanceId item_instance_ids = 5;
}

// TradeInstanceTerms are durable trade facts that settlement may persist. They
// describe the trade object, but do not tell settlement which columns to modify.
message TradeInstanceTerms {
  TradeTypeName trade_type_name = 1;
  repeated TradeAssetLine offered_assets = 2;
  repeated TradeAssetLine requested_assets = 3;
  IskAmount broker_fee = 4;
  IskAmount escrow_amount = 5;
  int64 expiry_time_unix_millis = 6;
}

// TradeInstanceTransactionCommonMetadata is shared by all transaction-function
// metadata and exists only for retry, tracing, and correlation. It carries no
// TradeState target, preventing callers from contradicting the function name.
message TradeInstanceTransactionCommonMetadata {
  TradeInstanceTransactionId transaction_id = 1;
  IdempotencyKey idempotency_key = 2;
  CorrelationId correlation_id = 3;
  TraceId trace_id = 4;
}

// IssueTradeInstanceMetadata is the exact metadata shape for the
// issue_trade_instance transaction function. Its presence means Layer 2 chose
// issue_trade_instance from a game interaction where the trade instance was
// absent and must become OUTSTANDING if committed.
message IssueTradeInstanceMetadata {
  TradeInstanceTransactionCommonMetadata common = 1;
  TradeInstanceRowIdentities row_identities = 2;
  ProjectTradeInteraction source_interaction = 3;
  TradeInstanceTerms terms = 4;
}

// SettleTradeInstanceMetadata is the exact metadata shape for the
// settle_trade_instance transaction function. Its presence means Layer 2 chose
// settlement for an existing OUTSTANDING trade instance. Settlement may commit
// COMPLETED, FAILED, or EXPIRED, but cannot create ACCEPTED or IN_PROGRESS.
message SettleTradeInstanceMetadata {
  TradeInstanceTransactionCommonMetadata common = 1;
  TradeInstanceRowIdentities row_identities = 2;
  ProjectTradeInteraction source_interaction = 3;
  TradeInstanceTerms terms = 4;
}

// CancelTradeInstanceMetadata is the exact metadata shape for the
// cancel_trade_instance transaction function. Its presence means Layer 2 chose
// cancellation for an existing OUTSTANDING trade instance, and the only committed
// lifecycle state for this function is CANCELLED.
message CancelTradeInstanceMetadata {
  TradeInstanceTransactionCommonMetadata common = 1;
  TradeInstanceRowIdentities row_identities = 2;
  ProjectTradeInteraction source_interaction = 3;
}

// TradeInstanceTransactionMetadata is the lifecycle-enforcing dispatch object.
// Exactly one transaction function can be requested, and only the three current
// lifecycle functions exist. This prevents settlement from exposing accepted,
// in_progress, standalone expire, or standalone fail operations.
message TradeInstanceTransactionMetadata {
  oneof requested_transaction_function {
    IssueTradeInstanceMetadata issue_trade_instance = 1;
    SettleTradeInstanceMetadata settle_trade_instance = 2;
    CancelTradeInstanceMetadata cancel_trade_instance = 3;
  }
}
