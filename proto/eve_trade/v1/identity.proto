syntax = "proto3";

package eve_trade.v1;

option go_package = "github.com/QuasarRay/eve-trade/proto/gen/eve_trade/v1;evetradev1";
option java_multiple_files = true;
option java_package = "com.quasarray.evetrade.v1";

// This file defines only stable identifiers shared across the lifecycle.
// It intentionally contains no trade rules, no transaction function names,
// and no gRPC services, so identifiers can be reused without letting any
// service bypass the lifecycle.

// CapsuleerId identifies the player character who caused or participates in
// a trade. It is a durable identity, not a UI session identity.
message CapsuleerId {
  int64 value = 1;
}

// GameServerId identifies the game-server process or shard that reported the
// raw trade-GUI activity to the API Gateway.
message GameServerId {
  string value = 1;
}

// GameSessionId identifies the capsuleer's current game session; it is useful
// for gateway validation but must not be treated as durable trade ownership.
message GameSessionId {
  string value = 1;
}

// GameUiVersion identifies the game UI/client build so the API Gateway can
// translate raw UI names without exposing those names to Market Layer 2.
message GameUiVersion {
  string value = 1;
}

// GameUiActivityId uniquely identifies one raw player trade-GUI activity from
// the game server before the API Gateway translates it.
message GameUiActivityId {
  string value = 1;
}

// ProjectTradeInteractionId uniquely identifies the API Gateway's translated
// project-proto interaction that Market Layer 1 receives.
message ProjectTradeInteractionId {
  string value = 1;
}

// TradeInstanceId identifies the durable trade_instance row. Market supplies
// this identity in transaction metadata; Trade Settlement decides the tables
// and columns, but uses this identity to find the row.
message TradeInstanceId {
  string value = 1;
}

// TradeInstanceTransactionId identifies one attempt to change a trade_instance.
// It is separate from TradeInstanceId because retries and idempotency are about
// transaction attempts, not the trade object's lifecycle state.
message TradeInstanceTransactionId {
  string value = 1;
}

// IdempotencyKey makes repeated calls safe without letting retries create or
// settle the same trade more than once.
message IdempotencyKey {
  string value = 1;
}

// TraceId follows the lifecycle across gateway, market, settlement, and the
// database transaction without becoming part of game rules.
message TraceId {
  string value = 1;
}

// CorrelationId groups the raw game activity, translated interaction, market
// decision, and settlement command as one observable lifecycle operation.
message CorrelationId {
  string value = 1;
}

// TradeTypeName is the game-domain label derived by Market Layer 2. It is not
// accepted from the game server or the API Gateway.
message TradeTypeName {
  string value = 1;
}

// TradeHubId identifies the trade hub / station / structure context selected
// by the market rules for this trade instance.
message TradeHubId {
  string value = 1;
}

// WalletId identifies a wallet row that settlement may lock/debit/credit.
message WalletId {
  int64 value = 1;
}

// BrokerId identifies the broker/system participant used by market rules.
message BrokerId {
  string value = 1;
}

// ItemTypeId identifies the EVE item type, such as a commodity or ship module.
message ItemTypeId {
  int64 value = 1;
}

// ItemStackId identifies a durable stack of item instances in hangar/cargo.
message ItemStackId {
  string value = 1;
}

// ItemInstanceId identifies one durable item instance when trade rules require
// instance-level ownership instead of stack-level quantity.
message ItemInstanceId {
  string value = 1;
}

// IskAmount stores ISK in minor units / fixed precision determined by the
// implementation so proto callers cannot send floating point money.
message IskAmount {
  int64 value = 1;
}

// ItemQuantity stores item count as an integer because settlement must not
// accept fractional item movement.
message ItemQuantity {
  int64 value = 1;
}
