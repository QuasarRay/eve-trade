syntax = "proto3";

package eve_trade.v1;

option go_package = "github.com/QuasarRay/eve-trade/proto/gen/eve_trade/v1;evetradev1";
option java_multiple_files = true;
option java_package = "com.quasarray.evetrade.v1";

// This enum is the only durable lifecycle state for trade_instance.
// It deliberately excludes ACCEPTED, IN_PROGRESS, CLAIMABLE, and CLAIMED:
// - ACCEPTED is not present because this lifecycle has no accepted cycle.
// - IN_PROGRESS is not present because this lifecycle has no in-progress cycle.
// - CLAIMABLE and CLAIMED belong to item instances/gameplay collection, not
//   to trade_instance lifecycle.
enum TradeState {
  // Unspecified is only for missing/invalid messages and must never be stored
  // as a durable trade_instance state.
  TRADE_STATE_UNSPECIFIED = 0;

  // OUTSTANDING means the trade_instance has been issued and is waiting.
  TRADE_STATE_OUTSTANDING = 1;

  // COMPLETED means settle_trade_instance committed the durable ownership,
  // wallet, reservation, and trade-state changes successfully.
  TRADE_STATE_COMPLETED = 2;

  // FAILED means settle_trade_instance attempted fulfillment but the durable
  // operation failed according to settlement rules.
  TRADE_STATE_FAILED = 3;

  // EXPIRED means settle_trade_instance refused to settle an expired trade and
  // committed expiry instead. Standalone expire cycles are intentionally not
  // exposed by this lifecycle version.
  TRADE_STATE_EXPIRED = 4;

  // CANCELLED means cancel_trade_instance committed cancellation and released
  // any relevant reservations.
  TRADE_STATE_CANCELLED = 5;
}
