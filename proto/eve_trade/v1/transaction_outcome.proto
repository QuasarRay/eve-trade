syntax = "proto3";

package eve_trade.v1;

import "eve_trade/v1/identity.proto";

option go_package = "github.com/QuasarRay/eve-trade/proto/gen/eve_trade/v1;evetradev1";
option java_multiple_files = true;
option java_package = "com.quasarray.evetrade.v1";

// This file keeps transaction attempt outcomes separate from TradeState.
// A TradeState cannot fail; only an attempt to issue, settle, or cancel can be
// committed, rejected, rolled back, or become unknown.

// TransactionAttemptStatus describes the settlement attempt, not the durable
// lifecycle state. Timeout handling is intentionally documented elsewhere.
enum TransactionAttemptStatus {
  TRANSACTION_ATTEMPT_STATUS_UNSPECIFIED = 0;
  TRANSACTION_ATTEMPT_STATUS_COMMITTED = 1;
  TRANSACTION_ATTEMPT_STATUS_REJECTED = 2;
  TRANSACTION_ATTEMPT_STATUS_ROLLED_BACK = 3;
  TRANSACTION_ATTEMPT_STATUS_RESULT_UNKNOWN = 4;
  TRANSACTION_ATTEMPT_STATUS_IDEMPOTENT_REPLAY = 5;
}

// IssueTradeInstanceCommittedAsOutstanding is the only committed outcome of
// issue_trade_instance in this lifecycle.
message IssueTradeInstanceCommittedAsOutstanding {
  TradeInstanceId trade_instance_id = 1;
}

// SettleTradeInstanceCommittedAsCompleted is one allowed committed outcome of
// settle_trade_instance when ownership, wallet, reservation, and trade-state
// changes all commit successfully.
message SettleTradeInstanceCommittedAsCompleted {
  TradeInstanceId trade_instance_id = 1;
}

// SettleTradeInstanceCommittedAsFailed is one allowed committed outcome of
// settle_trade_instance when the fulfillment attempt fails and that failure is
// durably recorded.
message SettleTradeInstanceCommittedAsFailed {
  TradeInstanceId trade_instance_id = 1;
  string failure_reason = 2;
}

// SettleTradeInstanceCommittedAsExpired is one allowed committed outcome of
// settle_trade_instance when settlement independently detects expiry and records
// EXPIRED instead of settling stale trade terms.
message SettleTradeInstanceCommittedAsExpired {
  TradeInstanceId trade_instance_id = 1;
}

// CancelTradeInstanceCommittedAsCancelled is the only committed outcome of
// cancel_trade_instance in this lifecycle.
message CancelTradeInstanceCommittedAsCancelled {
  TradeInstanceId trade_instance_id = 1;
}

// TradeInstanceTransactionRejected means settlement rejected the requested
// transaction before committing any lifecycle change.
message TradeInstanceTransactionRejected {
  TradeInstanceTransactionId transaction_id = 1;
  string rejection_reason = 2;
}

// TradeInstanceTransactionRolledBack means settlement began durable work but
// rolled it back, so no lifecycle state change was committed.
message TradeInstanceTransactionRolledBack {
  TradeInstanceTransactionId transaction_id = 1;
  string rollback_reason = 2;
}

// TradeInstanceTransactionResultUnknown means the caller must use the separate
// timeout/unknown-result model before retrying or reporting finality.
message TradeInstanceTransactionResultUnknown {
  TradeInstanceTransactionId transaction_id = 1;
  string unknown_reason = 2;
}

// TradeInstanceTransactionOutcome is the only settlement outcome envelope. It
// allows only lifecycle outcomes present in trade_instance_lifecycle_v1.
message TradeInstanceTransactionOutcome {
  TradeInstanceTransactionId transaction_id = 1;
  TransactionAttemptStatus attempt_status = 2;

  oneof outcome {
    IssueTradeInstanceCommittedAsOutstanding issue_trade_instance_committed_as_outstanding = 10;
    SettleTradeInstanceCommittedAsCompleted settle_trade_instance_committed_as_completed = 11;
    SettleTradeInstanceCommittedAsFailed settle_trade_instance_committed_as_failed = 12;
    SettleTradeInstanceCommittedAsExpired settle_trade_instance_committed_as_expired = 13;
    CancelTradeInstanceCommittedAsCancelled cancel_trade_instance_committed_as_cancelled = 14;
    TradeInstanceTransactionRejected rejected = 20;
    TradeInstanceTransactionRolledBack rolled_back = 21;
    TradeInstanceTransactionResultUnknown result_unknown = 22;
  }
}
