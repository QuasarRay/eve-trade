apiVersion: v1
kind: Secret
metadata:
  name: observability-backends
  namespace: eve-trade-observability
type: Opaque
stringData:
  HONEYCOMB_API_KEY: "REPLACE_WITH_HONEYCOMB_INGEST_API_KEY"
  HONEYCOMB_DATASET: "eve-trade"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: eve-trade-observability
data:
  collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 256
        spike_limit_mib: 64

      batch:
        timeout: 5s
        send_batch_size: 8192

      resource:
        attributes:
          - key: service.namespace
            value: eve-trade
            action: upsert
          - key: deployment.environment.name
            value: production
            action: upsert
          - key: observability.run_id
            value: ${env:OBSERVABILITY_RUN_ID:-kubernetes}
            action: upsert

    exporters:
      otlphttp/honeycomb:
        endpoint: https://api.honeycomb.io:443
        headers:
          x-honeycomb-team: ${env:HONEYCOMB_API_KEY}
          x-honeycomb-dataset: ${env:HONEYCOMB_DATASET:-eve-trade}

      prometheus:
        endpoint: 0.0.0.0:9464
        namespace: eve_trade

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, resource, batch]
          exporters: [otlphttp/honeycomb]

        metrics:
          receivers: [otlp]
          processors: [memory_limiter, resource, batch]
          exporters: [otlphttp/honeycomb, prometheus]

        logs:
          receivers: [otlp]
          processors: [memory_limiter, resource, batch]
          exporters: [otlphttp/honeycomb]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: eve-trade-observability
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/component: observability
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-collector
        app.kubernetes.io/component: observability
      annotations:
        prometheus.io/path: /metrics
        prometheus.io/port: "9464"
        prometheus.io/scrape: "true"
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: otel-collector
          image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.153.0@sha256:93aad750175cbf1a973ae1c5886c3371f4d800f61be25cdd26870b8441ffe9fa
          args:
            - "--config=/etc/otelcol/collector.yaml"
          envFrom:
            - secretRef:
                name: observability-backends
          env:
            - name: OBSERVABILITY_RUN_ID
              value: "kubernetes"
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: health
              containerPort: 13133
            - name: metrics
              containerPort: 9464
          readinessProbe:
            httpGet:
              path: /
              port: health
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: eve-trade-observability
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/component: observability
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
    - name: health
      port: 13133
      targetPort: health
    - name: metrics
      port: 9464
      targetPort: metrics
