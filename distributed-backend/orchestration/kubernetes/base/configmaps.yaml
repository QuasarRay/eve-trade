apiVersion: v1
kind: ConfigMap
metadata:
  name: encore-backend-config
  labels:
    app.kubernetes.io/name: encore-backend
    app.kubernetes.io/component: backend
data:
  PORT: "4000"
  API_GATEWAY_QUILKIN_UDP_ADDR: ":26000"
  API_GATEWAY_QUILKIN_UDP_ENABLED: "true"
  API_GATEWAY_QUILKIN_MAX_PACKET_BYTES: "8192"
  API_GATEWAY_QUILKIN_WORKERS: "8"
  API_GATEWAY_QUILKIN_QUEUE_DEPTH: "1024"
  API_GATEWAY_UDP_RATE_LIMIT_PER_SECOND: "50"
  API_GATEWAY_UDP_RATE_LIMIT_BURST: "100"
  API_GATEWAY_UDP_REPLAY_TTL: "10m"
  API_GATEWAY_UDP_AUTH_REQUIRED: "true"
  API_GATEWAY_UDP_HMAC_KEY_ID: "primary"
  API_GATEWAY_DOWNSTREAM_TIMEOUT: "5s"
  MARKET_STARTUP_DEPENDENCY_TIMEOUT: "90s"
  MARKET_STARTUP_RETRY_INTERVAL: "2s"
  SETTLEMENT_WORKER_REQUEST_TIMEOUT: "10s"
  TRADE_SETTLEMENT_GRPC_TARGET: "trade-settlement:9092"

  OTEL_SERVICE_NAME: "encore-backend"
  OTEL_SERVICE_NAMESPACE: "eve-trade"
  OTEL_RESOURCE_ATTRIBUTES: "deployment.environment.name=production,service.namespace=eve-trade"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.eve-trade-observability.svc.cluster.local:4318"
  OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
  OTEL_TRACES_EXPORTER: "otlp"
  OTEL_METRICS_EXPORTER: "otlp"
  OTEL_LOGS_EXPORTER: "otlp"
  OTEL_PROPAGATORS: "tracecontext,baggage"
  OTEL_METRIC_EXPORT_INTERVAL: "15000"
  OBSERVABILITY_RUN_ID: "kubernetes"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: trade-settlement-config
  labels:
    app.kubernetes.io/name: trade-settlement
    app.kubernetes.io/component: settlement
data:
  SUMMER_ENV: "prod"
  OTEL_SERVICE_NAME: "trade-settlement"
  OTEL_SERVICE_NAMESPACE: "eve-trade"
  OTEL_RESOURCE_ATTRIBUTES: "deployment.environment.name=production,service.namespace=eve-trade"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.eve-trade-observability.svc.cluster.local:4318"
  OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
  OTEL_TRACES_EXPORTER: "otlp"
  OTEL_METRICS_EXPORTER: "otlp"
  OTEL_LOGS_EXPORTER: "otlp"
  OTEL_PROPAGATORS: "tracecontext,baggage"
  OTEL_METRIC_EXPORT_INTERVAL: "15000"
  OBSERVABILITY_RUN_ID: "kubernetes"

  RUST_LOG: "info,sqlx=info,tonic=info,h2=warn,hyper=warn,trade_settlement=debug"
  RUST_BACKTRACE: "0"
  TRACING_JSON: "true"
