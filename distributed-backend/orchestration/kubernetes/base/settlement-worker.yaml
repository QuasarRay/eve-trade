apiVersion: apps/v1
kind: Deployment
metadata:
  name: settlement-worker
  labels:
    app.kubernetes.io/name: settlement-worker
    app.kubernetes.io/component: settlement-worker
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: settlement-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: settlement-worker
        app.kubernetes.io/component: settlement-worker
    spec:
      serviceAccountName: settlement-worker
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: settlement-worker
          image: eve-trade/settlement-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: settlement-worker-config
            - secretRef:
                name: rabbitmq
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
