apiVersion: batch/v1
kind: Job
metadata:
  name: settlement-db-migrate
  labels:
    app.kubernetes.io/name: settlement-db-migrate
    app.kubernetes.io/component: migration
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: settlement-db-migrate
        app.kubernetes.io/component: migration
    spec:
      serviceAccountName: trade-settlement
      automountServiceAccountToken: false
      enableServiceLinks: false
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: postgres:16@sha256:081f1bc7bd5e143dbb6e487b710bbc27712cdcfaced4c071b8e47349aa1b4171
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: trade-settlement-migration-database
          command:
            - /bin/sh
            - -ec
          args:
            - |
              psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f /migrations/0001_settlement_schema.sql;
          volumeMounts:
            - name: migrations
              mountPath: /migrations
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: migrations
          configMap:
            name: settlement-db-migrations
