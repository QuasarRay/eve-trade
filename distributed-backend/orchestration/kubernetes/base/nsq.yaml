apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nsqd
  labels:
    app.kubernetes.io/name: nsqd
    app.kubernetes.io/component: pubsub
spec:
  serviceName: nsqd
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nsqd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nsqd
        app.kubernetes.io/component: pubsub
    spec:
      serviceAccountName: nsqd
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nsqd
          image: nsqio/nsq@sha256:1ceea517773270f5dd75f92777d4f7a49d8728b3884e28c749524ad6b031ca18
          imagePullPolicy: IfNotPresent
          args:
            - /nsqd
            - --data-path=/data
            - --broadcast-address=nsqd.eve-trade.svc.cluster.local
          ports:
            - name: tcp
              containerPort: 4150
            - name: http
              containerPort: 4151
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: nsqd
  labels:
    app.kubernetes.io/name: nsqd
    app.kubernetes.io/component: pubsub
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nsqd
  ports:
    - name: tcp
      port: 4150
      targetPort: tcp
    - name: http
      port: 4151
      targetPort: http
