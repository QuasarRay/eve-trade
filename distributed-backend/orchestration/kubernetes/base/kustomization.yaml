apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: eve-trade

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/part-of: eve-trade
      app.kubernetes.io/managed-by: kustomize

resources:
  - namespace.yaml
  - serviceaccounts.yaml
  - configmaps.yaml
  - migrate.yaml
  - nsq.yaml
  - encore-backend.yaml
  - trade-settlement.yaml

configMapGenerator:
  - name: settlement-db-migrations
    files:
      - 0001_settlement_schema.sql=migrations/0001_settlement_schema.sql

generatorOptions:
  disableNameSuffixHash: true

images:
  - name: eve-trade/encore-backend
    newTag: dev
  - name: eve-trade/trade-settlement
    newTag: dev
