apiVersion: apps/v1
kind: Deployment
metadata:
  name: trade-settlement
  labels:
    app.kubernetes.io/name: trade-settlement
    app.kubernetes.io/component: settlement
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: trade-settlement
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trade-settlement
        app.kubernetes.io/component: settlement
    spec:
      serviceAccountName: trade-settlement
      terminationGracePeriodSeconds: 45
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: trade-settlement
          image: eve-trade/trade-settlement:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 9092
          envFrom:
            - configMapRef:
                name: trade-settlement-config
            - secretRef:
                name: trade-settlement-database
          startupProbe:
            tcpSocket:
              port: grpc
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 18
          readinessProbe:
            tcpSocket:
              port: grpc
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: trade-settlement
  labels:
    app.kubernetes.io/name: trade-settlement
    app.kubernetes.io/component: settlement
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: trade-settlement
  ports:
    - name: grpc
      port: 9092
      targetPort: grpc
