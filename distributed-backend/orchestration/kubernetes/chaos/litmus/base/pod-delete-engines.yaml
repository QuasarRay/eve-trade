apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: eve-trade-nsqd
  labels:
    app.kubernetes.io/name: nsqd
    app.kubernetes.io/component: pubsub
    chaos.eve-trade.io/fault: pod-delete
    chaos.eve-trade.io/suite: pod-resilience
    chaos.eve-trade.io/target: nsqd
  annotations:
    chaos.eve-trade.io/intent: "Validate Encore Pub/Sub backend recovery for at-least-once settlement work delivery."
spec:
  engineState: "stop"
  annotationCheck: "false"
  jobCleanUpPolicy: "delete"
  appinfo:
    appns: "eve-trade"
    applabel: "app.kubernetes.io/name=nsqd"
    appkind: "statefulset"
  chaosServiceAccount: eve-trade-chaos-runner
  experiments:
    - name: pod-delete
      spec:
        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: "30"
            - name: CHAOS_INTERVAL
              value: "10"
            - name: FORCE
              value: "false"
            - name: PODS_AFFECTED_PERC
              value: "100"
            - name: SEQUENCE
              value: "serial"
            - name: RAMP_TIME
              value: "10"
        probe:
          - name: nsqd-ready-during-pod-delete
            type: httpProbe
            mode: Continuous
            httpProbe/inputs:
              url: http://nsqd.eve-trade.svc.cluster.local:4151/ping
              method:
                get:
                  criteria: "=="
                  responseCode: "200"
            runProperties:
              probeTimeout: 5
              interval: 2
              retry: 6
              stopOnFailure: true
