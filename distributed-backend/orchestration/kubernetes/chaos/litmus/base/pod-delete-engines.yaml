apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: eve-trade-encore-backend
  labels:
    app.kubernetes.io/name: encore-backend
    app.kubernetes.io/component: backend
    chaos.eve-trade.io/fault: pod-delete
    chaos.eve-trade.io/suite: pod-resilience
    chaos.eve-trade.io/target: encore-backend
  annotations:
    chaos.eve-trade.io/intent: "Validate Encore backend recovery while Quilkin and internal Pub/Sub callers keep stable targets."
spec:
  engineState: "stop"
  annotationCheck: "false"
  jobCleanUpPolicy: "delete"
  appinfo:
    appns: "eve-trade"
    applabel: "app.kubernetes.io/name=encore-backend"
    appkind: "deployment"
  chaosServiceAccount: eve-trade-chaos-runner
  experiments:
    - name: pod-delete
      spec:
        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: "30"
            - name: CHAOS_INTERVAL
              value: "10"
            - name: FORCE
              value: "false"
            - name: PODS_AFFECTED_PERC
              value: "50"
            - name: SEQUENCE
              value: "serial"
            - name: RAMP_TIME
              value: "10"
        probe:
          - name: encore-backend-ready-during-pod-delete
            type: httpProbe
            mode: Continuous
            httpProbe/inputs:
              url: http://encore-backend.eve-trade.svc.cluster.local:4000/gateway/readyz
              method:
                get:
                  criteria: "=="
                  responseCode: "200"
            runProperties:
              probeTimeout: 5
              interval: 2
              retry: 3
              stopOnFailure: true
---
