apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: eve-trade-api-gateway
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/component: gateway
    chaos.eve-trade.io/fault: pod-delete
    chaos.eve-trade.io/suite: pod-resilience
    chaos.eve-trade.io/target: api-gateway
  annotations:
    chaos.eve-trade.io/intent: "Validate API gateway recovery and service continuity after one graceful pod deletion."
spec:
  engineState: "stop"
  annotationCheck: "false"
  jobCleanUpPolicy: "delete"
  appinfo:
    appns: "eve-trade"
    applabel: "app.kubernetes.io/name=api-gateway"
    appkind: "deployment"
  chaosServiceAccount: eve-trade-chaos-runner
  experiments:
    - name: pod-delete
      spec:
        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: "30"
            - name: CHAOS_INTERVAL
              value: "10"
            - name: FORCE
              value: "false"
            - name: PODS_AFFECTED_PERC
              value: "0"
            - name: SEQUENCE
              value: "serial"
            - name: RAMP_TIME
              value: "10"
---
