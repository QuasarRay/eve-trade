apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: eve-trade

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/part-of: eve-trade
      app.kubernetes.io/managed-by: kustomize

resources:
  - namespace.yaml
  - serviceaccounts.yaml
  - configmaps.yaml
  - secret.database.yaml
  - api-gateway.yaml
  - market.yaml
  - trade-settlement.yaml

images:
  - name: eve-trade/api-gateway
    newTag: latest
  - name: eve-trade/market
    newTag: latest
  - name: eve-trade/trade-settlement
    newTag: latest
