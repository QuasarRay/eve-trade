apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: trade-settlement
  labels:
    app.kubernetes.io/name: trade-settlement
    app.kubernetes.io/component: settlement
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: trade-settlement
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
        - type: Percent
          value: 50
          periodSeconds: 120
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
