apiVersion: v1
kind: ServiceAccount
metadata:
  name: quilkin
  labels:
    app.kubernetes.io/name: quilkin
    app.kubernetes.io/component: udp-proxy
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quilkin
  labels:
    app.kubernetes.io/name: quilkin
    app.kubernetes.io/component: udp-proxy
spec:
  replicas: 3
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: quilkin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: quilkin
        app.kubernetes.io/component: udp-proxy
        app.kubernetes.io/environment: production
    spec:
      serviceAccountName: quilkin
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: quilkin
          image: eve-trade/quilkin:dev
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -ec
          args:
            - |
              # Serialize Quilkin 0.10.0 session creation so one upstream
              # socket cannot be concurrently assigned to two clients.
              exec /usr/local/bin/quilkin \
                --service.udp \
                --service.udp.port 26001 \
                --service.udp.workers 1 \
                --provider.static.endpoints "${API_GATEWAY_SERVICE_HOST}:26000" \
                --admin.enabled=false \
                --log-format json
          ports:
            - name: udp
              containerPort: 26001
              protocol: UDP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: quilkin
  labels:
    app.kubernetes.io/name: quilkin
    app.kubernetes.io/component: udp-proxy
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: quilkin
  ports:
    - name: udp
      port: 26001
      targetPort: udp
      protocol: UDP
