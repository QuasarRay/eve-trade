apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: api-gateway
spec:
  host: api-gateway.eve-trade.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    loadBalancer:
      simple: LEAST_REQUEST
    connectionPool:
      tcp:
        maxConnections: 512
        connectTimeout: 2s
      http:
        http2MaxRequests: 2048
        maxRequestsPerConnection: 1024
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 10s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: market
spec:
  host: market.eve-trade.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    loadBalancer:
