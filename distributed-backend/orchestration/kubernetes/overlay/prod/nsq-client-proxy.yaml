apiVersion: v1
kind: ConfigMap
metadata:
  name: nsq-client-proxy
data:
  envoy.yaml: |
    static_resources:
      listeners:
        - name: nsq_loopback
          address:
            socket_address:
              address: 127.0.0.1
              port_value: 4150
          filter_chains:
            - filters:
                - name: envoy.filters.network.tcp_proxy
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                    stat_prefix: nsq_mtls
                    cluster: nsqd_mtls
      clusters:
        - name: nsqd_mtls
          connect_timeout: 5s
          type: STRICT_DNS
          dns_lookup_family: V4_ONLY
          load_assignment:
            cluster_name: nsqd_mtls
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: nsqd.eve-trade.svc.cluster.local
                          port_value: 4150
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
              sni: nsqd.eve-trade.svc.cluster.local
              common_tls_context:
                tls_params:
                  tls_minimum_protocol_version: TLSv1_3
                tls_certificates:
                  - certificate_chain:
                      filename: /etc/nsq/client-tls/tls.crt
                    private_key:
                      filename: /etc/nsq/client-tls/tls.key
                validation_context:
                  trusted_ca:
                    filename: /etc/nsq/client-tls/ca.crt
                  match_typed_subject_alt_names:
                    - san_type: DNS
                      matcher:
                        exact: nsqd.eve-trade.svc.cluster.local
