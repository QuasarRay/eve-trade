apiVersion: v1
kind: ResourceQuota
metadata:
  name: eve-trade-prod-compute
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 6Gi
    limits.cpu: "16"
    limits.memory: 24Gi
    pods: "40"
    services: "10"
    configmaps: "20"
    secrets: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: eve-trade-prod-defaults
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      default:
        cpu: 1
        memory: 512Mi
      max:
        cpu: 4
        memory: 4Gi
      min:
        cpu: 25m
        memory: 64Mi
