apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: default-strict-mtls
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: default-deny
spec: {}
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-api-gateway
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  rules:
    - to:
        - operation:
            ports:
              - "8080"
            methods:
              - GET
            paths:
              - /healthz
              - /readyz
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-market
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: market
  rules:
    - to:
        - operation:
            ports:
              - "8081"
            methods:
              - GET
            paths:
              - /healthz
              - /readyz
    - from:
        - source:
            principals:
              - cluster.local/ns/eve-trade/sa/api-gateway
      to:
        - operation:
            ports:
              - "8081"
            methods:
              - POST
            paths:
              - /eve.market.v1.MarketService/SubmitTradeGuiInteraction
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-trade-settlement
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: trade-settlement
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/eve-trade/sa/settlement-worker
      to:
        - operation:
            ports:
              - "9092"
            methods:
              - POST
            paths:
              - /eve.trade_settlement.v1.TradeSettlementService/ExecuteSettlementBatch
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-settlement-worker
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: settlement-worker
  rules:
    - to:
        - operation:
            ports:
              - "8082"
            methods:
              - GET
            paths:
              - /healthz
              - /readyz
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-rabbitmq
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: rabbitmq
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/eve-trade/sa/market
              - cluster.local/ns/eve-trade/sa/settlement-worker
      to:
        - operation:
            ports:
              - "5672"
