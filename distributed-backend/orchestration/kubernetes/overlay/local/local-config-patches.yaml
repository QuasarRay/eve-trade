apiVersion: v1
kind: ConfigMap
metadata:
  name: encore-backend-config
data:
  API_GATEWAY_QUILKIN_UDP_ADDR: ":26000"
  API_GATEWAY_QUILKIN_UDP_ENABLED: "true"
  OTEL_SDK_DISABLED: "true"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: trade-settlement-config
data:
  OTEL_SDK_DISABLED: "true"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: settlement-db-migrate
spec:
  template:
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          args:
            - |
              until psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -tc "select 1" >/dev/null 2>&1; do
                echo "waiting for postgres";
                sleep 2;
              done;
              psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f /migrations/0001_settlement_schema.sql;
              psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f /runtime-role/runtime-role.sql;
          volumeMounts:
            - name: runtime-role
              mountPath: /runtime-role
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: runtime-role
          configMap:
            name: local-runtime-database-role
---
apiVersion: v1
kind: Service
metadata:
  name: quilkin
spec:
  type: NodePort
  ports:
    - name: udp
      port: 26001
      targetPort: udp
      protocol: UDP
      nodePort: 32601
