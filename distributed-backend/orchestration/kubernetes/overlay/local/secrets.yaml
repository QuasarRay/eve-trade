apiVersion: v1
kind: Secret
metadata:
  name: trade-settlement-database
  labels:
    app.kubernetes.io/name: trade-settlement-database
    app.kubernetes.io/component: database
type: Opaque
stringData:
  DATABASE_URL: postgres://eve_trade_runtime:runtime-password@postgres:5432/eve_trade
---
apiVersion: v1
kind: Secret
metadata:
  name: trade-settlement-migration-database
  labels:
    app.kubernetes.io/name: trade-settlement-migration-database
    app.kubernetes.io/component: database-migration
type: Opaque
stringData:
  DATABASE_URL: postgres://postgres:postgres@postgres:5432/eve_trade
---
# Local-only shared game packet HMAC key. Production must provide this Secret
# out-of-band; it is intentionally not defined in the production overlay.
apiVersion: v1
kind: Secret
metadata:
  name: gateway-edge-auth
  labels:
    app.kubernetes.io/name: encore-backend
    app.kubernetes.io/component: gateway
type: Opaque
stringData:
  GAME_PACKET_HMAC_SECRET: local-game-edge-secret
  GAME_PACKET_PRINCIPAL_KEYS_JSON: '{"seller":{"capsuleer_id":1001,"secret":"seller-player-secret"},"buyer":{"capsuleer_id":2002,"secret":"buyer-player-secret"},"other":{"capsuleer_id":3003,"secret":"other-player-secret"}}'
  GAME_PACKET_SIMULATOR_PRINCIPAL_KEYS_JSON: '{"1001":{"key_id":"seller","secret":"seller-player-secret"},"2002":{"key_id":"buyer","secret":"buyer-player-secret"},"3003":{"key_id":"other","secret":"other-player-secret"}}'
