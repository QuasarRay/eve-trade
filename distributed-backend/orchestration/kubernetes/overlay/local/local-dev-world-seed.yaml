apiVersion: batch/v1
kind: Job
metadata:
  name: local-dev-world-seed
  labels:
    app.kubernetes.io/name: local-dev-world-seed
    app.kubernetes.io/component: seed
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: local-dev-world-seed
        app.kubernetes.io/component: seed
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: postgres:16@sha256:081f1bc7bd5e143dbb6e487b710bbc27712cdcfaced4c071b8e47349aa1b4171
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: trade-settlement-migration-database
          command:
            - /bin/sh
            - -ec
          args:
            - |
              until psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -tc "select to_regclass('public.capsuleer')" | grep -q capsuleer; do
                echo "waiting for settlement schema";
                sleep 2;
              done;
              psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f /seed/local_dev_world.sql;
          volumeMounts:
            - name: seed
              mountPath: /seed
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: seed
          configMap:
            name: local-dev-world-seed
