apiVersion: v1
kind: ServiceAccount
metadata:
  name: simulator
  labels:
    app.kubernetes.io/name: simulator
    app.kubernetes.io/component: simulator
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simulator
  labels:
    app.kubernetes.io/name: simulator
    app.kubernetes.io/component: simulator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: simulator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: simulator
        app.kubernetes.io/component: simulator
    spec:
      serviceAccountName: simulator
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: simulator
          image: eve-trade/simulator:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: QUILKIN_UDP_HOST
              value: quilkin
            - name: QUILKIN_UDP_PORT
              value: "26001"
            - name: GAME_PACKET_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-gateway-edge-auth
                  key: GAME_PACKET_HMAC_SECRET
            - name: GAME_PACKET_HMAC_KEY_ID
              value: primary
            - name: SIMULATOR_ALLOWED_HOSTS
              value: "*"
            - name: SIMULATOR_DB
              value: /tmp/db.sqlite3
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: PYTHONUNBUFFERED
              value: "1"
          readinessProbe:
            httpGet:
              path: /api/gui/buttons/
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/gui/buttons/
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: simulator
  labels:
    app.kubernetes.io/name: simulator
    app.kubernetes.io/component: simulator
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: simulator
  ports:
    - name: http
      port: 8000
      targetPort: http
