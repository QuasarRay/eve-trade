apiVersion: v1
kind: ServiceAccount
metadata:
  name: quilkin
  labels:
    app.kubernetes.io/name: quilkin
    app.kubernetes.io/component: udp-proxy
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quilkin
  labels:
    app.kubernetes.io/name: quilkin
    app.kubernetes.io/component: udp-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: quilkin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: quilkin
        app.kubernetes.io/component: udp-proxy
    spec:
      serviceAccountName: quilkin
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: Unconfined
      containers:
        - name: quilkin
          image: eve-trade/quilkin:dev
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
          args:
            - |
              upstream="${QUILKIN_BACKEND_ENDPOINT:?QUILKIN_BACKEND_ENDPOINT is required}"
              case "${upstream}" in
                *.*.svc.cluster.local:[0-9]*) ;;
                *) echo "QUILKIN_BACKEND_ENDPOINT must be a Kubernetes service FQDN with a port" >&2; exit 64 ;;
              esac
              host="${upstream%:*}"
              port="${upstream##*:}"
              address="$(getent ahostsv4 "${host}" | awk 'NR == 1 { print $1 }')"
              [ -n "${address}" ] || { echo "unable to resolve Quilkin backend ${host}" >&2; exit 69; }
              # Serialize Quilkin 0.10.0 session creation so one upstream
              # socket cannot be concurrently assigned to two clients.
              exec /usr/local/bin/quilkin \
                --service.udp \
                --service.udp.port 26001 \
                --service.udp.workers 1 \
                --provider.static.endpoints "${address}:${port}" \
                --admin.enabled=false \
                --log-format json
          env:
            - name: QUILKIN_BACKEND_ENDPOINT
              value: encore-backend.eve-trade.svc.cluster.local:26000
          ports:
            - name: udp
              containerPort: 26001
              protocol: UDP
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: quilkin
  labels:
    app.kubernetes.io/name: quilkin
    app.kubernetes.io/component: udp-proxy
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: quilkin
  ports:
    - name: udp
      port: 26001
      targetPort: udp
      protocol: UDP
