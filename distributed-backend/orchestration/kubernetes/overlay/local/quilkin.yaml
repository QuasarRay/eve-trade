apiVersion: v1
kind: ServiceAccount
metadata:
  name: quilkin
  labels:
    app.kubernetes.io/name: quilkin
    app.kubernetes.io/component: udp-proxy
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quilkin
  labels:
    app.kubernetes.io/name: quilkin
    app.kubernetes.io/component: udp-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: quilkin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: quilkin
        app.kubernetes.io/component: udp-proxy
    spec:
      serviceAccountName: quilkin
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: Unconfined
      containers:
        - name: quilkin
          image: eve-trade/quilkin:dev
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
          args:
            - |
              exec /usr/local/bin/quilkin \
                --service.udp \
                --service.udp.port 26001 \
                --provider.static.endpoints "${API_GATEWAY_SERVICE_HOST}:26000" \
                --admin.enabled=false \
                --log-format json
          ports:
            - name: udp
              containerPort: 26001
              protocol: UDP
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: quilkin
  labels:
    app.kubernetes.io/name: quilkin
    app.kubernetes.io/component: udp-proxy
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: quilkin
  ports:
    - name: udp
      port: 26001
      targetPort: udp
      protocol: UDP
