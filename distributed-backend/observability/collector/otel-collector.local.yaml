# Credential-free local collector. Run with Kubernetes, the collector binary,
# or another local supervisor.
# Enable service SDKs with OTEL_SDK_DISABLED=false.
extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 64
  resource:
    attributes:
      - key: service.namespace
        value: eve-trade
        action: upsert
      - key: observability.run_id
        value: ${env:OBSERVABILITY_RUN_ID:-local-unset}
        action: upsert
  batch:
    timeout: 2s
    send_batch_size: 1024

exporters:
  debug:
    verbosity: normal
  file/traces:
    path: /var/lib/otel/traces.json
    rotation:
      max_megabytes: 20
      max_backups: 3
  file/logs:
    path: /var/lib/otel/logs.json
    rotation:
      max_megabytes: 20
      max_backups: 3
  file/metrics:
    path: /var/lib/otel/metrics.json
    rotation:
      max_megabytes: 20
      max_backups: 3

service:
  extensions: [health_check]
  telemetry:
    logs:
      encoding: json
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [debug, file/traces]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [debug, file/logs]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [debug, file/metrics]
