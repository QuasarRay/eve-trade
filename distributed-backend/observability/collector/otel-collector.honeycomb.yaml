# Honeycomb OTLP collector.
# Required: HONEYCOMB_API_KEY
# Recommended: HONEYCOMB_DATASET=eve-trade (or HONEYCOMB_SERVICE_NAME)
# Optional: HONEYCOMB_API_ENDPOINT=https://api.honeycomb.io:443
# Services send OTLP to this collector through OTEL_EXPORTER_OTLP_ENDPOINT.
extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 384
    spike_limit_mib: 96
  resource:
    attributes:
      - key: service.namespace
        value: eve-trade
        action: upsert
      - key: observability.run_id
        value: ${env:OBSERVABILITY_RUN_ID:-unknown}
        action: upsert
  batch:
    timeout: 5s
    send_batch_size: 2048

exporters:
  otlphttp/honeycomb:
    endpoint: ${env:HONEYCOMB_API_ENDPOINT:-https://api.honeycomb.io:443}
    headers:
      x-honeycomb-team: ${env:HONEYCOMB_API_KEY}
      x-honeycomb-dataset: ${env:HONEYCOMB_DATASET:-eve-trade}
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 4096
    retry_on_failure:
      enabled: true
      initial_interval: 1s
      max_interval: 30s
      max_elapsed_time: 5m
  debug:
    verbosity: basic
  file/traces:
    path: /var/lib/otel/traces.json
    rotation:
      max_megabytes: 20
      max_backups: 3
  file/logs:
    path: /var/lib/otel/logs.json
    rotation:
      max_megabytes: 20
      max_backups: 3
  file/metrics:
    path: /var/lib/otel/metrics.json
    rotation:
      max_megabytes: 20
      max_backups: 3

service:
  extensions: [health_check]
  telemetry:
    logs:
      encoding: json
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlphttp/honeycomb, debug, file/traces]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlphttp/honeycomb, debug, file/logs]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlphttp/honeycomb, debug, file/metrics]
