syntax = "proto3";

package settlement.v1;

import "eve_trade/v1/trade_instance_transaction.proto";
import "eve_trade/v1/transaction_outcome.proto";

option go_package = "github.com/QuasarRay/eve-trade/distributed-backend/proto/gen/settlement/v1;settlementv1";
option java_multiple_files = true;
option java_package = "com.quasarray.evetrade.settlement.v1";

// This file is the only Market-to-Trade-Settlement gRPC contract. It receives
// transaction metadata chosen by Market Layer 2 and executes only the three
// lifecycle transaction functions present in TradeInstanceTransactionMetadata.

// TradeInstanceTransactionRequest wraps the lifecycle-enforcing metadata. The
// oneof inside metadata is the dispatch instruction for trade-settlement's
// same-named internal function: issue_trade_instance, settle_trade_instance, or
// cancel_trade_instance.
message TradeInstanceTransactionRequest {
  eve_trade.v1.TradeInstanceTransactionMetadata metadata = 1;
}

// TradeInstanceTransactionResponse returns the result of the transaction
// attempt. It separates attempt status from durable trade lifecycle outcomes, so
// a failed transaction attempt cannot be confused with a TradeState failing.
message TradeInstanceTransactionResponse {
  eve_trade.v1.TradeInstanceTransactionOutcome outcome = 1;
}

// TradeSettlementService enforces the lifecycle hop:
// @trade_settlement_receives_transaction_request_via_gRPC_validates_metadata_reads_requested_transaction_function_name_and_dispatches_to_same_named_internal_transaction_function.
// It is a stream so unrelated trade-instance transactions can be processed
// concurrently, while causally related transactions are controlled by metadata
// and settlement locking/idempotency rules.
service TradeSettlementService {
  rpc StreamTradeInstanceTransactions(stream TradeInstanceTransactionRequest)
      returns (stream TradeInstanceTransactionResponse);
}
