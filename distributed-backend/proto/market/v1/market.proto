syntax = "proto3";

package market.v1;

import "google/protobuf/timestamp.proto";
import "trade/v1/common.proto";
import "trade/v1/market_types.proto";

option go_package = "github.com/QuasarRay/eve-trade/distributed-backend/proto/gen/market/v1;marketv1";

// MarketService owns game-specific market meaning and rules. It validates order
// creation, cancellation, expiration, and fill intent. It does not perform the
// durable database transaction itself; it sends validated commands to
// TradeSettlementService.
service MarketService {
  rpc CreateSellOrder(CreateSellOrderRequest) returns (CreateSellOrderResponse);
  rpc CreateBuyOrder(CreateBuyOrderRequest) returns (CreateBuyOrderResponse);

  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
  rpc ListOutstandingOrders(ListOutstandingOrdersRequest) returns (ListOutstandingOrdersResponse);

  rpc AcceptFillOrder(AcceptFillOrderRequest) returns (AcceptFillOrderResponse);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
  rpc ExpireOrder(ExpireOrderRequest) returns (ExpireOrderResponse);

  rpc GetTransactionState(GetTransactionStateRequest) returns (GetTransactionStateResponse);
  rpc ClaimResult(ClaimResultRequest) returns (ClaimResultResponse);
}

message CreateSellOrderRequest {
  trade.v1.RequestContext context = 1;

  trade.v1.CapsuleerId seller_capsuleer_id = 2;
  trade.v1.WalletId seller_wallet_id = 3;
  trade.v1.ItemTypeId item_type_id = 4;
  trade.v1.TradeItemKind item_kind = 5;

  // One of these is set depending on item_kind.
  trade.v1.ItemStackId offered_item_stack_id = 6;
  trade.v1.ItemInstanceId offered_item_instance_id = 7;

  trade.v1.StationId station_id = 8;
  trade.v1.RegionId region_id = 9;

  trade.v1.Quantity quantity = 10;
  trade.v1.IskAmount unit_price_isk = 11;
  google.protobuf.Timestamp expires_at = 12;
}

message CreateBuyOrderRequest {
  trade.v1.RequestContext context = 1;

  trade.v1.CapsuleerId buyer_capsuleer_id = 2;
  trade.v1.WalletId buyer_wallet_id = 3;
  trade.v1.ItemTypeId item_type_id = 4;
  trade.v1.TradeItemKind item_kind = 5;

  trade.v1.StationId station_id = 6;
  trade.v1.RegionId region_id = 7;

  trade.v1.Quantity quantity = 8;
  trade.v1.IskAmount unit_price_isk = 9;
  google.protobuf.Timestamp expires_at = 10;
}

message CreateSellOrderResponse {
  trade.v1.TradeOrderView trade_order = 1;
  bool idempotent_replay = 2;
  trade.v1.TradeError failure = 3;
}

message CreateBuyOrderResponse {
  trade.v1.TradeOrderView trade_order = 1;
  bool idempotent_replay = 2;
  trade.v1.TradeError failure = 3;
}

message GetOrderRequest {
  trade.v1.RequestContext context = 1;
  trade.v1.TradeOrderId trade_order_id = 2;
}

message GetOrderResponse {
  trade.v1.TradeOrderView trade_order = 1;
}

message ListOutstandingOrdersRequest {
  trade.v1.RequestContext context = 1;
  trade.v1.RegionId region_id = 2;
  trade.v1.StationId station_id = 3;
  trade.v1.ItemTypeId item_type_id = 4;
  trade.v1.TradeOrderSide order_side = 5;
  uint32 page_size = 6;
  string page_token = 7;
}

message ListOutstandingOrdersResponse {
  repeated trade.v1.TradeOrderView trade_orders = 1;
  string next_page_token = 2;
}

message AcceptFillOrderRequest {
  trade.v1.RequestContext context = 1;

  trade.v1.TradeOrderId trade_order_id = 2;
  trade.v1.CapsuleerId accepting_capsuleer_id = 3;

  // Wallet used by the buyer side of this transaction.
  trade.v1.WalletId buyer_wallet_id = 4;

  // Wallet used by the seller side of this transaction.
  trade.v1.WalletId seller_wallet_id = 5;

  trade.v1.TradeItemKind item_kind = 6;

  // Source item provided by the seller/filler.
  trade.v1.ItemStackId source_item_stack_id = 7;
  trade.v1.ItemInstanceId source_item_instance_id = 8;

  // Optional preferred destination. Settlement may create/choose a destination
  // stack depending on implementation.
  trade.v1.ItemStackId destination_item_stack_id = 9;
  trade.v1.ItemInstanceId destination_item_instance_id = 10;

  trade.v1.Quantity quantity = 11;
}

message AcceptFillOrderResponse {
  trade.v1.TradeOrderView trade_order = 1;
  trade.v1.TradeTransactionView trade_transaction = 2;
  trade.v1.SettlementView settlement = 3;
  bool idempotent_replay = 4;
  trade.v1.TradeError failure = 5;
}

message CancelOrderRequest {
  trade.v1.RequestContext context = 1;
  trade.v1.TradeOrderId trade_order_id = 2;
  trade.v1.CapsuleerId requesting_capsuleer_id = 3;
  string reason = 4;
}

message CancelOrderResponse {
  trade.v1.TradeOrderView trade_order = 1;
  bool idempotent_replay = 2;
  trade.v1.TradeError failure = 3;
}

message ExpireOrderRequest {
  trade.v1.RequestContext context = 1;
  trade.v1.TradeOrderId trade_order_id = 2;
}

message ExpireOrderResponse {
  trade.v1.TradeOrderView trade_order = 1;
  bool idempotent_replay = 2;
  trade.v1.TradeError failure = 3;
}

message GetTransactionStateRequest {
  trade.v1.RequestContext context = 1;
  trade.v1.TradeTransactionId trade_transaction_id = 2;
}

message GetTransactionStateResponse {
  trade.v1.TradeTransactionView trade_transaction = 1;
  trade.v1.SettlementView settlement = 2;
}

message ClaimResultRequest {
  trade.v1.RequestContext context = 1;
  trade.v1.TradeTransactionId trade_transaction_id = 2;
  trade.v1.CapsuleerId claiming_capsuleer_id = 3;
}

message ClaimResultResponse {
  trade.v1.TradeClaimView claim = 1;
  trade.v1.TradeTransactionView trade_transaction = 2;
  bool idempotent_replay = 3;
  trade.v1.TradeError failure = 4;
}
