syntax = "proto3";

package gateway.v1;

import "common/v1/common.proto";
import "common/v1/domain.proto";

service ApiGatewayTradeService {
  rpc CreateSellOrder(CreateSellOrderRequest) returns (CreateSellOrderResponse);
  rpc CreateBuyOrder(CreateBuyOrderRequest) returns (CreateBuyOrderResponse);

  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
  rpc ListOutstandingOrders(ListOutstandingOrdersRequest) returns (ListOutstandingOrdersResponse);

  rpc AcceptFillOrder(AcceptFillOrderRequest) returns (AcceptFillOrderResponse);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);

  rpc GetTransactionState(GetTransactionStateRequest) returns (GetTransactionStateResponse);
  rpc ClaimResult(ClaimResultRequest) returns (ClaimResultResponse);
}

message CreateSellOrderRequest {
  common.v1.RequestContext context = 1;

  common.v1.ItemStackId item_stack_id = 2;
  common.v1.ItemTypeId item_type_id = 3;

  common.v1.StationId station_id = 4;
  common.v1.RegionId region_id = 5;

  common.v1.Quantity quantity = 6;
  common.v1.IskAmount unit_price = 7;

  uint32 duration_days = 8;
}

message CreateSellOrderResponse {
  common.v1.MarketOrder order = 1;
}

message CreateBuyOrderRequest {
  common.v1.RequestContext context = 1;

  common.v1.WalletId wallet_id = 2;
  common.v1.ItemTypeId item_type_id = 3;

  common.v1.StationId station_id = 4;
  common.v1.RegionId region_id = 5;

  common.v1.Quantity quantity = 6;
  common.v1.IskAmount unit_price = 7;

  uint32 duration_days = 8;
}

message CreateBuyOrderResponse {
  common.v1.MarketOrder order = 1;
}

message GetOrderRequest {
  common.v1.RequestContext context = 1;
  common.v1.MarketOrderId order_id = 2;
}

message GetOrderResponse {
  common.v1.MarketOrder order = 1;
}

message ListOutstandingOrdersRequest {
  common.v1.RequestContext context = 1;

  common.v1.RegionId region_id = 2;
  common.v1.StationId station_id = 3;
  common.v1.ItemTypeId item_type_id = 4;

  // Optional. unspecified means both buy and sell orders.
  common.v1.MarketOrderSide side = 5;

  uint32 page_size = 6;
  string page_token = 7;
}

message ListOutstandingOrdersResponse {
  repeated common.v1.MarketOrder orders = 1;
  string next_page_token = 2;
}

message AcceptFillOrderRequest {
  common.v1.RequestContext context = 1;

  common.v1.MarketOrderId order_id = 2;
  common.v1.Quantity quantity = 3;

  // Required when accepting/filling a sell order.
  common.v1.WalletId buyer_wallet_id = 4;

  // Required when accepting/filling a buy order.
  common.v1.ItemStackId seller_item_stack_id = 5;
  common.v1.WalletId seller_wallet_id = 6;
}

message AcceptFillOrderResponse {
  common.v1.MarketOrder order = 1;
  common.v1.TradeTransaction transaction = 2;
  common.v1.SettlementResult settlement = 3;
}

message CancelOrderRequest {
  common.v1.RequestContext context = 1;
  common.v1.MarketOrderId order_id = 2;
}

message CancelOrderResponse {
  common.v1.MarketOrder order = 1;
}

message GetTransactionStateRequest {
  common.v1.RequestContext context = 1;
  common.v1.TradeTransactionId transaction_id = 2;
}

message GetTransactionStateResponse {
  common.v1.TradeTransaction transaction = 1;
}

message ClaimResultRequest {
  common.v1.RequestContext context = 1;
  common.v1.TradeTransactionId transaction_id = 2;
}

message ClaimResultResponse {
  common.v1.SettlementResult settlement = 1;
}