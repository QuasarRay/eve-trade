syntax = "proto3";

package gateway.v1;

import "eve_trade/v1/game_ui_activity.proto";

option go_package = "github.com/QuasarRay/eve-trade/distributed-backend/proto/gen/gateway/v1;gatewayv1";
option java_multiple_files = true;
option java_package = "com.quasarray.evetrade.gateway.v1";

// This service is the only game-server-facing trade entry point. It accepts raw
// trade-GUI activity and does not expose market transaction functions, TradeState,
// settlement metadata, or database row identities to the game server.
service ApiGatewayTradeService {
  // StreamGameTradeUiActivities enforces the first lifecycle hop:
  // @API-gateway receives GameUI activity(...) from Game Server via gRPC.
  // The request type is raw GUI activity only; the game server cannot call
  // issue_trade_instance, settle_trade_instance, or cancel_trade_instance.
  rpc StreamGameTradeUiActivities(stream eve_trade.v1.GameTradeUiActivity)
      returns (stream eve_trade.v1.GameTradeUiActivityResult);
}
