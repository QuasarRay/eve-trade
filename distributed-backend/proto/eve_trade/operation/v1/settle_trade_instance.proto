syntax = "proto3";

package eve_trade.operation.v1;

import "eve_trade/common/v1/identity.proto";
import "eve_trade/common/v1/money.proto";
import "eve_trade/common/v1/operation_metadata.proto";
import "eve_trade/common/v1/quantity.proto";
import "eve_trade/domain/trade/v1/trade_claim.proto";
import "eve_trade/domain/trade/v1/trade_instance.proto";
import "eve_trade/domain/trade/v1/trade_transaction.proto";
import "eve_trade/operation/v1/accept_trade_instance.proto";

option go_package = "github.com/QuasarRay/eve-trade/distributed-backend/proto/gen/eve_trade/operation/v1;operationv1";
option java_multiple_files = true;
option java_package = "com.quasarray.evetrade.operation.v1";

message SettleTradeInstanceRowIds {
  eve_trade.common.v1.TradeInstanceId trade_instance_id = 1;
  eve_trade.common.v1.ItemStackEscrowId source_item_stack_escrow_id = 2;
  eve_trade.common.v1.TradeTransactionId trade_transaction_id = 3;
  eve_trade.common.v1.SettlementId settlement_id = 4;
  eve_trade.common.v1.CapsuleerId seller_capsuleer_id = 5;
  eve_trade.common.v1.WalletId seller_wallet_id = 6;
  eve_trade.common.v1.CapsuleerId buyer_capsuleer_id = 7;
  eve_trade.common.v1.WalletId buyer_wallet_id = 8;
  eve_trade.common.v1.ItemStackId destination_item_stack_id = 9;
}

message SettleTradeInstanceTerms {
  eve_trade.common.v1.ItemQuantity quantity = 1;
  eve_trade.common.v1.IskAmount unit_price_isk = 2;
  eve_trade.common.v1.IskAmount total_price_isk = 3;
  int64 requested_at_unix_millis = 4;
}

message SettleTradeInstanceCommand {
  eve_trade.common.v1.OperationMetadata metadata = 1;
  SettleTradeInstanceRowIds row_ids = 2;
  SettleTradeInstanceTerms terms = 3;
  AcceptTradeInstanceCommand accepted_trade = 4;
}

message SettleTradeInstanceApplied {
  eve_trade.domain.trade.v1.TradeInstance trade_instance = 1;
  eve_trade.domain.trade.v1.TradeTransaction trade_transaction = 2;
  repeated eve_trade.domain.trade.v1.TradeClaim trade_claims = 3;
  repeated eve_trade.domain.trade.v1.TradeClaimIsk trade_claim_isks = 4;
  repeated eve_trade.domain.trade.v1.TradeClaimItemStack trade_claim_item_stacks = 5;
}
