syntax = "proto3";

package eve_trade.gateway.v1;

import "eve_trade/gateway/v1/game_ui_activity.proto";

option go_package = "github.com/QuasarRay/eve-trade/distributed-backend/proto/gen/eve_trade/gateway/v1;gatewayv1";
option java_multiple_files = true;
option java_package = "com.quasarray.evetrade.gateway.v1";

message StreamGameTradeUiActivitiesRequest {
  GameTradeUiActivity activity = 1;
}

message StreamGameTradeUiActivitiesResponse {
  GameTradeUiActivityResult result = 1;
}

service GameTradeGatewayService {
  rpc StreamGameTradeUiActivities(stream StreamGameTradeUiActivitiesRequest) returns (stream StreamGameTradeUiActivitiesResponse);
}
