syntax = "proto3";

package eve_trade.gateway.v1;

import "eve_trade/common/v1/identity.proto";

option go_package = "github.com/QuasarRay/eve-trade/distributed-backend/proto/gen/eve_trade/gateway/v1;gatewayv1";
option java_multiple_files = true;
option java_package = "com.quasarray.evetrade.gateway.v1";

enum GameTradeUiActivityKind {
  GAME_TRADE_UI_ACTIVITY_KIND_UNSPECIFIED = 0;
  GAME_TRADE_UI_ACTIVITY_KIND_ISSUE_BUTTON_PRESSED = 1;
  GAME_TRADE_UI_ACTIVITY_KIND_ACCEPT_BUTTON_PRESSED = 2;
  GAME_TRADE_UI_ACTIVITY_KIND_CANCEL_BUTTON_PRESSED = 3;
}

enum GameTradeUiActivityResultStatus {
  GAME_TRADE_UI_ACTIVITY_RESULT_STATUS_UNSPECIFIED = 0;
  GAME_TRADE_UI_ACTIVITY_RESULT_STATUS_ACCEPTED = 1;
  GAME_TRADE_UI_ACTIVITY_RESULT_STATUS_REJECTED = 2;
  GAME_TRADE_UI_ACTIVITY_RESULT_STATUS_RESULT_UNKNOWN = 3;
}

message GameTradeUiField {
  string raw_game_field_name = 1;
  string raw_game_field_value = 2;
}

message GameTradeUiActivity {
  eve_trade.common.v1.GameUiActivityId activity_id = 1;
  eve_trade.common.v1.GameServerId game_server_id = 2;
  eve_trade.common.v1.GameSessionId game_session_id = 3;
  eve_trade.common.v1.CapsuleerId capsuleer_id = 4;
  eve_trade.common.v1.GameUiVersion game_ui_version = 5;
  GameTradeUiActivityKind activity_kind = 6;
  string raw_game_screen_name = 7;
  string raw_game_button_name = 8;
  repeated GameTradeUiField visible_fields = 9;
  int64 occurred_at_unix_millis = 10;
}

message GameTradeUiActivityResult {
  eve_trade.common.v1.GameUiActivityId activity_id = 1;
  eve_trade.common.v1.CorrelationId correlation_id = 2;
  GameTradeUiActivityResultStatus result_status = 3;
  string player_safe_message = 4;
  eve_trade.common.v1.TradeInstanceId player_safe_trade_reference = 5;
}
