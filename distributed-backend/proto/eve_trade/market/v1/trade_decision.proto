syntax = "proto3";

package eve_trade.market.v1;

import "eve_trade/common/v1/errors.proto";
import "eve_trade/common/v1/identity.proto";
import "eve_trade/market/v1/project_trade_interaction.proto";
import "eve_trade/operation/v1/cancel_trade_instance.proto";
import "eve_trade/operation/v1/expire_trade_instance.proto";
import "eve_trade/operation/v1/issue_trade_instance.proto";
import "eve_trade/operation/v1/settle_trade_instance.proto";
import "eve_trade/operation/v1/trade_operation_kind.proto";
import "eve_trade/settlement/v1/settlement_result.proto";

option go_package = "github.com/QuasarRay/eve-trade/distributed-backend/proto/gen/eve_trade/market/v1;marketv1";
option java_multiple_files = true;
option java_package = "com.quasarray.evetrade.market.v1";

message TradeDecision {
  eve_trade.common.v1.ProjectTradeInteractionId source_interaction_id = 1;
  eve_trade.common.v1.CorrelationId correlation_id = 2;
  eve_trade.operation.v1.TradeOperationKind required_operation_kind = 3;
  ProjectTradeInteraction source_interaction = 4;

  oneof required_operation {
    eve_trade.operation.v1.IssueTradeInstanceCommand issue_trade_instance = 10;
    eve_trade.operation.v1.SettleTradeInstanceCommand settle_trade_instance = 11;
    eve_trade.operation.v1.CancelTradeInstanceCommand cancel_trade_instance = 12;
    eve_trade.operation.v1.ExpireTradeInstanceCommand expire_trade_instance = 13;
  }
}

message MarketTradeResult {
  eve_trade.common.v1.ProjectTradeInteractionId interaction_id = 1;
  eve_trade.common.v1.CorrelationId correlation_id = 2;
  TradeDecision decision = 3;
  eve_trade.settlement.v1.TradeSettlementResult settlement_result = 4;
  eve_trade.common.v1.ErrorDetail error = 5;
}
