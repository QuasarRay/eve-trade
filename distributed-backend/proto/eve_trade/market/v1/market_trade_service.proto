syntax = "proto3";

package eve_trade.market.v1;

import "eve_trade/market/v1/project_trade_interaction.proto";
import "eve_trade/market/v1/trade_decision.proto";

option go_package = "github.com/QuasarRay/eve-trade/distributed-backend/proto/gen/eve_trade/market/v1;marketv1";
option java_multiple_files = true;
option java_package = "com.quasarray.evetrade.market.v1";

message StreamProjectTradeInteractionsRequest {
  ProjectTradeInteraction interaction = 1;
}

message StreamProjectTradeInteractionsResponse {
  MarketTradeResult result = 1;
}

service MarketTradeService {
  rpc StreamProjectTradeInteractions(stream StreamProjectTradeInteractionsRequest) returns (stream StreamProjectTradeInteractionsResponse);
}
