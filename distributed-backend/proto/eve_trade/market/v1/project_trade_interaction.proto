syntax = "proto3";

package eve_trade.market.v1;

import "eve_trade/common/v1/identity.proto";
import "eve_trade/common/v1/money.proto";
import "eve_trade/common/v1/quantity.proto";

option go_package = "github.com/QuasarRay/eve-trade/distributed-backend/proto/gen/eve_trade/market/v1;marketv1";
option java_multiple_files = true;
option java_package = "com.quasarray.evetrade.market.v1";

enum ProjectTradeInteractionKind {
  PROJECT_TRADE_INTERACTION_KIND_UNSPECIFIED = 0;
  PROJECT_TRADE_INTERACTION_KIND_PLAYER_ISSUED_VISIBLE_TRADE = 1;
  PROJECT_TRADE_INTERACTION_KIND_PLAYER_ACCEPTED_VISIBLE_TRADE = 2;
  PROJECT_TRADE_INTERACTION_KIND_PLAYER_CANCELLED_VISIBLE_TRADE = 3;
}

enum KnownTradeWindow {
  KNOWN_TRADE_WINDOW_UNSPECIFIED = 0;
  KNOWN_TRADE_WINDOW_MARKET_WINDOW = 1;
  KNOWN_TRADE_WINDOW_AUCTION_WINDOW = 2;
  KNOWN_TRADE_WINDOW_DIRECT_TRADE_WINDOW = 3;
  KNOWN_TRADE_WINDOW_CONTRACT_WINDOW = 4;
}

enum KnownTradeButton {
  KNOWN_TRADE_BUTTON_UNSPECIFIED = 0;
  KNOWN_TRADE_BUTTON_ISSUE = 1;
  KNOWN_TRADE_BUTTON_ACCEPT = 2;
  KNOWN_TRADE_BUTTON_CANCEL = 3;
}

message PlayerSelectedItem {
  eve_trade.common.v1.ItemTypeId item_type_id = 1;
  eve_trade.common.v1.ItemStackId item_stack_id = 2;
  eve_trade.common.v1.ItemQuantity quantity = 3;
}

message PlayerTypedTradeValues {
  eve_trade.common.v1.ItemQuantity quantity = 1;
  eve_trade.common.v1.IskAmount unit_price_isk = 2;
  eve_trade.common.v1.IskAmount total_price_isk = 3;
}

message VisibleTradeContext {
  eve_trade.common.v1.TradeInstanceId trade_instance_id = 1;
  eve_trade.common.v1.WalletId wallet_id = 2;
  eve_trade.common.v1.StationId station_id = 3;
  eve_trade.common.v1.RegionId region_id = 4;
  eve_trade.common.v1.ItemStackId source_item_stack_id = 5;
  eve_trade.common.v1.ItemStackId destination_item_stack_id = 6;
}

message ProjectTradeInteraction {
  eve_trade.common.v1.ProjectTradeInteractionId interaction_id = 1;
  eve_trade.common.v1.GameUiActivityId source_activity_id = 2;
  eve_trade.common.v1.CorrelationId correlation_id = 3;
  eve_trade.common.v1.TraceId trace_id = 4;
  eve_trade.common.v1.CapsuleerId capsuleer_id = 5;
  eve_trade.common.v1.GameSessionId game_session_id = 6;
  ProjectTradeInteractionKind interaction_kind = 7;
  KnownTradeWindow trade_window = 8;
  KnownTradeButton trade_button = 9;
  VisibleTradeContext visible_trade_context = 10;
  repeated PlayerSelectedItem selected_items = 11;
  PlayerTypedTradeValues typed_values = 12;
  int64 occurred_at_unix_millis = 13;
}
