syntax = "proto3";

package eve_trade.domain.trade.v1;

import "eve_trade/common/v1/identity.proto";
import "eve_trade/common/v1/money.proto";
import "eve_trade/common/v1/quantity.proto";
import "eve_trade/domain/trade/v1/trade_state.proto";

option go_package = "github.com/QuasarRay/eve-trade/distributed-backend/proto/gen/eve_trade/domain/trade/v1;tradev1";
option java_multiple_files = true;
option java_package = "com.quasarray.evetrade.domain.trade.v1";

message TradeTransaction {
  eve_trade.common.v1.TradeTransactionId trade_transaction_id = 1;
  eve_trade.common.v1.OperationId operation_id = 2;
  eve_trade.common.v1.TradeInstanceId trade_instance_id = 3;
  TradeTransactionState trade_transaction_state = 4;
  eve_trade.common.v1.CapsuleerId buyer_capsuleer_id = 5;
  eve_trade.common.v1.WalletId buyer_wallet_id = 6;
  eve_trade.common.v1.CapsuleerId seller_capsuleer_id = 7;
  eve_trade.common.v1.WalletId seller_wallet_id = 8;
  eve_trade.common.v1.ItemTypeId item_type_id = 9;
  eve_trade.common.v1.ItemStackEscrowId source_item_stack_escrow_id = 10;
  eve_trade.common.v1.ItemStackId destination_item_stack_id = 11;
  eve_trade.common.v1.ItemQuantity quantity = 12;
  eve_trade.common.v1.IskAmount unit_price_isk = 13;
  eve_trade.common.v1.IskAmount total_price_isk = 14;
  int64 created_at_unix_millis = 15;
  int64 updated_at_unix_millis = 16;
  int64 completed_at_unix_millis = 17;
}
