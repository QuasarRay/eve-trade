syntax = "proto3";

package eve_trade.domain.trade.v1;

option go_package = "github.com/QuasarRay/eve-trade/distributed-backend/proto/gen/eve_trade/domain/trade/v1;tradev1";
option java_multiple_files = true;
option java_package = "com.quasarray.evetrade.domain.trade.v1";

enum TradeState {
  TRADE_STATE_UNSPECIFIED = 0;
  TRADE_STATE_OUTSTANDING = 1;
  TRADE_STATE_COMPLETED = 2;
  TRADE_STATE_FAILED = 3;
  TRADE_STATE_EXPIRED = 4;
  TRADE_STATE_CANCELLED = 5;
}

enum TradeTransactionState {
  TRADE_TRANSACTION_STATE_UNSPECIFIED = 0;
  TRADE_TRANSACTION_STATE_RECEIVED = 1;
  TRADE_TRANSACTION_STATE_COMPLETED = 2;
  TRADE_TRANSACTION_STATE_FAILED = 3;
  TRADE_TRANSACTION_STATE_EXPIRED = 4;
  TRADE_TRANSACTION_STATE_ROLLED_BACK = 5;
}

enum TradeEscrowState {
  TRADE_ESCROW_STATE_UNSPECIFIED = 0;
  TRADE_ESCROW_STATE_HELD = 1;
  TRADE_ESCROW_STATE_PARTIALLY_USED = 2;
  TRADE_ESCROW_STATE_USED = 3;
  TRADE_ESCROW_STATE_RELEASED = 4;
  TRADE_ESCROW_STATE_CANCELLED = 5;
  TRADE_ESCROW_STATE_EXPIRED = 6;
}

enum TradeClaimState {
  TRADE_CLAIM_STATE_UNSPECIFIED = 0;
  TRADE_CLAIM_STATE_CREATED = 1;
  TRADE_CLAIM_STATE_CLAIMED = 2;
  TRADE_CLAIM_STATE_CANCELLED = 3;
}

enum SettlementState {
  SETTLEMENT_STATE_UNSPECIFIED = 0;
  SETTLEMENT_STATE_IN_PROGRESS = 1;
  SETTLEMENT_STATE_COMPLETED = 2;
  SETTLEMENT_STATE_REJECTED = 3;
  SETTLEMENT_STATE_ROLLED_BACK = 4;
  SETTLEMENT_STATE_RESULT_UNKNOWN = 5;
  SETTLEMENT_STATE_IDEMPOTENT_REPLAY = 6;
}

enum SettlementPhase {
  SETTLEMENT_PHASE_UNSPECIFIED = 0;
  SETTLEMENT_PHASE_CREATED = 1;
  SETTLEMENT_PHASE_VALIDATING_METADATA = 2;
  SETTLEMENT_PHASE_LOCKING_ROWS = 3;
  SETTLEMENT_PHASE_APPLYING_OWNERSHIP = 4;
  SETTLEMENT_PHASE_WRITING_AUDIT = 5;
  SETTLEMENT_PHASE_COMPLETED = 6;
  SETTLEMENT_PHASE_FAILED = 7;
}
