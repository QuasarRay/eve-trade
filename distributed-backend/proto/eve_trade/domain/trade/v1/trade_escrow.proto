syntax = "proto3";

package eve_trade.domain.trade.v1;

import "eve_trade/common/v1/identity.proto";
import "eve_trade/common/v1/money.proto";
import "eve_trade/common/v1/quantity.proto";
import "eve_trade/domain/trade/v1/trade_state.proto";

option go_package = "github.com/QuasarRay/eve-trade/distributed-backend/proto/gen/eve_trade/domain/trade/v1;tradev1";
option java_multiple_files = true;
option java_package = "com.quasarray.evetrade.domain.trade.v1";

message WalletEscrow {
  eve_trade.common.v1.WalletEscrowId wallet_escrow_id = 1;
  eve_trade.common.v1.TradeInstanceId trade_instance_id = 2;
  eve_trade.common.v1.IskAmount isk_amount = 3;
  eve_trade.common.v1.CapsuleerId owner_id = 4;
  eve_trade.common.v1.WalletOperationId created_wallet_operation_id = 5;
  eve_trade.common.v1.WalletOperationId released_wallet_operation_id = 6;
  int64 created_at_unix_millis = 7;
  int64 updated_at_unix_millis = 8;
  int64 released_at_unix_millis = 9;
}

message ItemStackEscrow {
  eve_trade.common.v1.ItemStackEscrowId item_stack_escrow_id = 1;
  eve_trade.common.v1.CapsuleerId issuer_id = 2;
  eve_trade.common.v1.TradeInstanceId trade_instance_id = 3;
  eve_trade.common.v1.ItemQuantity quantity = 4;
  int64 created_at_unix_millis = 5;
  int64 updated_at_unix_millis = 6;
  int64 released_at_unix_millis = 7;
  TradeEscrowState escrow_state = 8;
  string release_reason = 9;
  eve_trade.common.v1.ItemStackId source_item_stack_id = 10;
}
