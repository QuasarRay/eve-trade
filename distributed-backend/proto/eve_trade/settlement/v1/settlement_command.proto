syntax = "proto3";

package eve_trade.settlement.v1;

import "eve_trade/common/v1/operation_metadata.proto";
import "eve_trade/operation/v1/cancel_trade_instance.proto";
import "eve_trade/operation/v1/expire_trade_instance.proto";
import "eve_trade/operation/v1/issue_trade_instance.proto";
import "eve_trade/operation/v1/settle_trade_instance.proto";
import "eve_trade/operation/v1/trade_operation_kind.proto";

option go_package = "github.com/QuasarRay/eve-trade/distributed-backend/proto/gen/eve_trade/settlement/v1;settlementv1";
option java_multiple_files = true;
option java_package = "com.quasarray.evetrade.settlement.v1";

message TradeSettlementCommand {
  eve_trade.common.v1.OperationMetadata metadata = 1;
  eve_trade.operation.v1.TradeOperationKind operation_kind = 2;

  oneof command {
    eve_trade.operation.v1.IssueTradeInstanceCommand issue_trade_instance = 10;
    eve_trade.operation.v1.SettleTradeInstanceCommand settle_trade_instance = 11;
    eve_trade.operation.v1.CancelTradeInstanceCommand cancel_trade_instance = 12;
    eve_trade.operation.v1.ExpireTradeInstanceCommand expire_trade_instance = 13;
  }
}
