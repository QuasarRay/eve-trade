syntax = "proto3";

package eve_trade.settlement.v1;

import "eve_trade/common/v1/errors.proto";
import "eve_trade/common/v1/identity.proto";
import "eve_trade/common/v1/operation_metadata.proto";
import "eve_trade/domain/trade/v1/trade_escrow.proto";
import "eve_trade/domain/trade/v1/trade_instance.proto";
import "eve_trade/domain/trade/v1/trade_state.proto";
import "eve_trade/domain/trade/v1/trade_transaction.proto";
import "eve_trade/operation/v1/cancel_trade_instance.proto";
import "eve_trade/operation/v1/expire_trade_instance.proto";
import "eve_trade/operation/v1/issue_trade_instance.proto";
import "eve_trade/operation/v1/settle_trade_instance.proto";
import "eve_trade/operation/v1/trade_operation_kind.proto";

option go_package = "github.com/QuasarRay/eve-trade/distributed-backend/proto/gen/eve_trade/settlement/v1;settlementv1";
option java_multiple_files = true;
option java_package = "com.quasarray.evetrade.settlement.v1";

enum TransactionAttemptStatus {
  TRANSACTION_ATTEMPT_STATUS_UNSPECIFIED = 0;
  TRANSACTION_ATTEMPT_STATUS_COMMITTED = 1;
  TRANSACTION_ATTEMPT_STATUS_REJECTED = 2;
  TRANSACTION_ATTEMPT_STATUS_ROLLED_BACK = 3;
  TRANSACTION_ATTEMPT_STATUS_RESULT_UNKNOWN = 4;
  TRANSACTION_ATTEMPT_STATUS_IDEMPOTENT_REPLAY = 5;
}

message IssueTradeInstanceOutcome {
  eve_trade.operation.v1.IssueTradeInstanceApplied applied = 1;
}

message SettleTradeInstanceOutcome {
  eve_trade.operation.v1.SettleTradeInstanceApplied applied = 1;
  eve_trade.domain.trade.v1.TradeState resulting_trade_state = 2;
}

message CancelTradeInstanceOutcome {
  eve_trade.operation.v1.CancelTradeInstanceApplied applied = 1;
}

message ExpireTradeInstanceOutcome {
  eve_trade.operation.v1.ExpireTradeInstanceApplied applied = 1;
}

message TradeSettlementRejected {
  eve_trade.common.v1.ErrorDetail error = 1;
}

message TradeSettlementRolledBack {
  eve_trade.common.v1.ErrorDetail error = 1;
}

message TradeSettlementResultUnknown {
  eve_trade.common.v1.ErrorDetail error = 1;
}

message SettlementStep {
  eve_trade.common.v1.SettlementStepId settlement_step_id = 1;
  eve_trade.common.v1.SettlementId settlement_id = 2;
  string step_name = 3;
  eve_trade.domain.trade.v1.SettlementPhase step_phase = 4;
  eve_trade.domain.trade.v1.SettlementState step_state = 5;
  int64 started_at_unix_millis = 6;
  int64 completed_at_unix_millis = 7;
  string failure_code = 8;
  string failure_message = 9;
}

message TradeSettlementResult {
  eve_trade.common.v1.OperationMetadata metadata = 1;
  eve_trade.operation.v1.TradeOperationKind operation_kind = 2;
  TransactionAttemptStatus attempt_status = 3;
  eve_trade.common.v1.TradeInstanceId trade_instance_id = 4;
  eve_trade.common.v1.TradeTransactionId trade_transaction_id = 5;
  eve_trade.common.v1.SettlementId settlement_id = 6;
  eve_trade.domain.trade.v1.TradeState resulting_trade_state = 7;
  repeated SettlementStep settlement_steps = 8;

  oneof result {
    IssueTradeInstanceOutcome issue_trade_instance = 20;
    SettleTradeInstanceOutcome settle_trade_instance = 21;
    CancelTradeInstanceOutcome cancel_trade_instance = 22;
    ExpireTradeInstanceOutcome expire_trade_instance = 23;
    TradeSettlementRejected rejected = 30;
    TradeSettlementRolledBack rolled_back = 31;
    TradeSettlementResultUnknown result_unknown = 32;
  }
}

message TradeSettlementSnapshot {
  eve_trade.domain.trade.v1.TradeInstance trade_instance = 1;
  eve_trade.domain.trade.v1.TradeTransaction trade_transaction = 2;
  repeated eve_trade.domain.trade.v1.ItemStackEscrow item_stack_escrows = 3;
  repeated eve_trade.domain.trade.v1.WalletEscrow wallet_escrows = 4;
}
