syntax = "proto3";

package eve_trade.common.v1;

option go_package = "github.com/QuasarRay/eve-trade/distributed-backend/proto/gen/eve_trade/common/v1;commonv1";
option java_multiple_files = true;
option java_package = "com.quasarray.evetrade.common.v1";

message IskAmount {
  int64 minor_units = 1;
}

message IskDelta {
  int64 minor_units = 1;
}

message MoneyScale {
  int32 decimal_places = 1;
}
