syntax = "proto3";

package eve_trade.common.v1;

import "eve_trade/common/v1/identity.proto";

option go_package = "github.com/QuasarRay/eve-trade/distributed-backend/proto/gen/eve_trade/common/v1;commonv1";
option java_multiple_files = true;
option java_package = "com.quasarray.evetrade.common.v1";

message IdempotencyKey {
  string value = 1;
}

message RequestFingerprint {
  string value = 1;
}

enum IdempotencyOperationState {
  IDEMPOTENCY_OPERATION_STATE_UNSPECIFIED = 0;
  IDEMPOTENCY_OPERATION_STATE_RECEIVED = 1;
  IDEMPOTENCY_OPERATION_STATE_COMPLETED = 2;
  IDEMPOTENCY_OPERATION_STATE_FAILED = 3;
}

enum RequestAttemptState {
  REQUEST_ATTEMPT_STATE_UNSPECIFIED = 0;
  REQUEST_ATTEMPT_STATE_RECEIVED = 1;
  REQUEST_ATTEMPT_STATE_COMPLETED = 2;
  REQUEST_ATTEMPT_STATE_FAILED = 3;
}

message IdempotencyRecord {
  IdempotencyKey idempotency_key = 1;
  RequestFingerprint request_fingerprint = 2;
  string operation_name = 3;
  IdempotencyOperationState operation_state = 4;
  CreatedByService created_by_service = 5;
  int64 created_at_unix_millis = 6;
  int64 completed_at_unix_millis = 7;
}

message RequestAttempt {
  RequestId request_id = 1;
  IdempotencyKey idempotency_key = 2;
  string received_by_service = 3;
  RequestAttemptState attempt_state = 4;
  string failure_code = 5;
  int64 received_at_unix_millis = 6;
  int64 completed_at_unix_millis = 7;
}
