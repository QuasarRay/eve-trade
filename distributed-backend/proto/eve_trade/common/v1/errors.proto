syntax = "proto3";

package eve_trade.common.v1;

option go_package = "github.com/QuasarRay/eve-trade/distributed-backend/proto/gen/eve_trade/common/v1;commonv1";
option java_multiple_files = true;
option java_package = "com.quasarray.evetrade.common.v1";

enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_VALIDATION_FAILED = 1;
  ERROR_CODE_NOT_FOUND = 2;
  ERROR_CODE_ALREADY_EXISTS = 3;
  ERROR_CODE_FAILED_PRECONDITION = 4;
  ERROR_CODE_PERMISSION_DENIED = 5;
  ERROR_CODE_CONFLICT = 6;
  ERROR_CODE_INTERNAL = 7;
  ERROR_CODE_UNAVAILABLE = 8;
  ERROR_CODE_RESULT_UNKNOWN = 9;
}

message FieldViolation {
  string field_path = 1;
  string description = 2;
}

message ErrorDetail {
  ErrorCode code = 1;
  string message = 2;
  repeated FieldViolation field_violations = 3;
  bool retryable = 4;
}
