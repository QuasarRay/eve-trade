syntax = "proto3";

package eve_trade.common.v1;

import "eve_trade/common/v1/idempotency.proto";
import "eve_trade/common/v1/identity.proto";

option go_package = "github.com/QuasarRay/eve-trade/distributed-backend/proto/gen/eve_trade/common/v1;commonv1";
option java_multiple_files = true;
option java_package = "com.quasarray.evetrade.common.v1";

enum OperationState {
  OPERATION_STATE_UNSPECIFIED = 0;
  OPERATION_STATE_STARTED = 1;
  OPERATION_STATE_COMPLETED = 2;
  OPERATION_STATE_FAILED = 3;
  OPERATION_STATE_ROLLED_BACK = 4;
  OPERATION_STATE_RESULT_UNKNOWN = 5;
}

message OperationMetadata {
  OperationId operation_id = 1;
  RequestId request_id = 2;
  IdempotencyKey idempotency_key = 3;
  CorrelationId correlation_id = 4;
  TraceId trace_id = 5;
  SourceSystem source_system = 6;
  ExternalOperationId external_operation_id = 7;
  CapsuleerId caused_by_capsuleer_id = 8;
  CreatedByService created_by_service = 9;
  int64 requested_at_unix_millis = 10;
}

message OperationRecord {
  OperationId operation_id = 1;
  string operation_kind = 2;
  SourceSystem source_system = 3;
  ExternalOperationId external_operation_id = 4;
  RequestId request_id = 5;
  IdempotencyKey idempotency_key = 6;
  CapsuleerId caused_by_capsuleer_id = 7;
  OperationState operation_state = 8;
  CreatedByService created_by_service = 9;
  int64 started_at_unix_millis = 10;
  int64 completed_at_unix_millis = 11;
  string failure_code = 12;
  string failure_message = 13;
}
