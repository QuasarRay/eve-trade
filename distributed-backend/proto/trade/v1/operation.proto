syntax = "proto3";

package trade.v1;

option go_package = "github.com/QuasarRay/eve-trade/distributed-backend/proto/gen/trade/v1;tradev1";

import "google/protobuf/timestamp.proto";
import "trade/v1/common.proto";

// operation.proto exposes lightweight views of the operation/idempotency model.
// These messages are not meant to make the database execute logic. They let
// services identify, trace, retry, and audit commands safely.

message OperationView {
  OperationId operation_id = 1;
  OperationKind operation_kind = 2;
  string source_system = 3;
  string external_operation_id = 4;
  RequestId request_id = 5;
  IdempotencyKey idempotency_key = 6;
  CapsuleerId caused_by_capsuleer_id = 7;
  OperationState operation_state = 8;
  string created_by_service = 9;
  google.protobuf.Timestamp started_at = 10;
  google.protobuf.Timestamp completed_at = 11;
  TradeError failure = 12;
}

message IdempotencyView {
  IdempotencyKey idempotency_key = 1;
  string request_fingerprint = 2;
  string operation_name = 3;
  OperationState operation_state = 4;
  string created_by_service = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp completed_at = 7;
}

message RequestAttemptView {
  RequestId request_id = 1;
  IdempotencyKey idempotency_key = 2;
  string received_by_service = 3;
  OperationState attempt_state = 4;
  TradeError failure = 5;
  google.protobuf.Timestamp received_at = 6;
  google.protobuf.Timestamp completed_at = 7;
}

message IdempotencyResultView {
  IdempotencyKey idempotency_key = 1;
  OperationId operation_id = 2;
  string result_kind = 3;
  TradeOrderId trade_order_id = 4;
  TradeTransactionId trade_transaction_id = 5;
  SettlementId settlement_id = 6;
  WalletOperationId wallet_operation_id = 7;
  ItemStackOperationId item_stack_operation_id = 8;
  ItemInstanceOperationId item_instance_operation_id = 9;
  TransactionState result_state = 10;
  TradeError failure = 11;
  google.protobuf.Timestamp created_at = 12;
}
