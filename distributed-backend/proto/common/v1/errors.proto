syntax = "proto3";

package trade.v1;

import "common/v1/error.proto";

// Lowercase values are deliberate.
// They preserve canonical domain/API names over generated-code style preferences.
enum TradeErrorCode {
  trade_error_code_unspecified = 0;

  insufficient_isk = 1;
  insufficient_items = 2;
  invalid_state_transition = 3;
  order_expired = 4;
  order_cancelled = 5;
  item_not_market_eligible = 6;
  duplicate_request = 7;
  settlement_conflict = 8;
}

message TradeError {
  TradeErrorCode code = 1;

  // Human-readable diagnostic. Not for gameplay rules.
  string message = 2;

  RequestId request_id = 3;
  IdempotencyKey idempotency_key = 4;

  MarketOrderId order_id = 5;
  TradeTransactionId transaction_id = 6;
  SettlementId settlement_id = 7;
}