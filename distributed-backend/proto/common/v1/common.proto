syntax = "proto3";

package common.v1;

// Replace the module path above with your real repository path.

// ---------- Strong IDs ----------

message CapsuleerId {
  string value = 1;
}

message ItemTypeId {
  string value = 1;
}

message ItemStackId {
  string value = 1;
}

message StationId {
  string value = 1;
}

message RegionId {
  string value = 1;
}

message WalletId {
  string value = 1;
}

message MarketOrderId {
  string value = 1;
}

message TradeTransactionId {
  string value = 1;
}

message SettlementId {
  string value = 1;
}

message RequestId {
  string value = 1;
}

message IdempotencyKey {
  string value = 1;
}

// ---------- Amounts ----------

message IskAmount {
  // Fixed-scale integer. No float/double.
  // Recommended MVP scale: 1 minor_unit = 0.01 ISK.
  int64 minor_units = 1;
}

message Quantity {
  uint64 units = 1;
}

// ---------- Request metadata ----------

message RequestContext {
  // Unique per RPC attempt.
  RequestId request_id = 1;

  // Stable across retries of the same player/game-server intent.
  IdempotencyKey idempotency_key = 2;

  // Inspired by ESI compatibility-date behavior.
  // Format: YYYY-MM-DD.
  string compatibility_date = 3;

  // Set for player/capsuleer-initiated calls.
  // May be omitted for system jobs such as expiration sweeps.
  CapsuleerId acting_capsuleer_id = 4;
}