syntax = "proto3";

package settlement.v1;

import "common/v1/common.proto";
import "common/v1/domain.proto";

service TradeSettlementService {
  // Internal writer command used after MarketService validates order creation.
  rpc OpenMarketOrder(OpenMarketOrderRequest) returns (OpenMarketOrderResponse);

  // Correctness-critical atomic movement of ISK/items.
  rpc RequestSettlement(common.v1.SettlementRequest) returns (common.v1.SettlementResult);

  rpc GetTransactionState(GetTransactionStateRequest) returns (GetTransactionStateResponse);

  // Used when a result has been produced but must be collected.
  rpc ClaimResult(ClaimResultRequest) returns (ClaimResultResponse);

  // Internal writer commands used after MarketService validates state transition.
  rpc CancelMarketOrder(CancelMarketOrderRequest) returns (CancelMarketOrderResponse);
  rpc ExpireMarketOrder(ExpireMarketOrderRequest) returns (ExpireMarketOrderResponse);
}

message OpenMarketOrderRequest {
  common.v1.RequestContext context = 1;

  // Market has already validated the order terms.
  common.v1.MarketOrder order = 2;
}

message OpenMarketOrderResponse {
  common.v1.MarketOrder order = 1;
  bool idempotent_replay = 2;
}

message GetTransactionStateRequest {
  common.v1.RequestContext context = 1;
  common.v1.TradeTransactionId transaction_id = 2;
}

message GetTransactionStateResponse {
  common.v1.TradeTransaction transaction = 1;
}

message ClaimResultRequest {
  common.v1.RequestContext context = 1;
  common.v1.TradeTransactionId transaction_id = 2;
}

message ClaimResultResponse {
  common.v1.SettlementResult settlement = 1;
}

message CancelMarketOrderRequest {
  common.v1.RequestContext context = 1;
  common.v1.MarketOrderId order_id = 2;
}

message CancelMarketOrderResponse {
  common.v1.MarketOrder order = 1;
  bool idempotent_replay = 2;
}

message ExpireMarketOrderRequest {
  common.v1.RequestContext context = 1;
  common.v1.MarketOrderId order_id = 2;
}

message ExpireMarketOrderResponse {
  common.v1.MarketOrder order = 1;
  bool idempotent_replay = 2;
}