version: v2

clean: true

managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/QuasarRay/eve-trade/distributed-backend/proto/gen

plugins:
  - local: protoc-gen-go
    out: proto/gen
    opt:
      - paths=source_relative

  - local: protoc-gen-connect-go
    out: proto/gen
    opt:
      - paths=source_relative
      
  # - remote: buf.build/protocolbuffers/go:v1.36.11
  #   out: proto/gen
  #   opt:
  #     - paths=source_relative

  # - remote: buf.build/connectrpc/go:v1.18.1
  #   out: proto/gen
  #   opt:
  #     - paths=source_relative

inputs:
  - directory: proto