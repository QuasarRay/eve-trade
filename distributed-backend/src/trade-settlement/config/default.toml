# This configuration block is read by summer-grpc. The service is kept small,
# but it still needs a stable network binding so market can call it.
[grpc]
binding = "0.0.0.0"
port = 9092
graceful = true

[sqlx]
uri = "postgres://postgres:postgres@localhost:5432/eve_trade"
min_connections = 1
max_connections = 10
acquire_timeout = 5000
