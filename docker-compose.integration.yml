# This block names the compose project so Docker resources are grouped under one predictable prefix.
# It exists so repeated integration runs are easy to inspect and clean up with `docker compose down -v`.
name: eve-trade-integration

# This block declares the  runtime services used by the integration harness.
# It exists because these tests intentionally exercise market -> trade-settlement -> PostgreSQL instead of replacing settlement with a fake.
services:
  # This block starts the only durable storage dependency required by the MVP trade path.
  # It exists so settlement writes against a  PostgreSQL engine,  enum types,  constraints, and  transactions.
  postgres:
    image: postgres:16@sha256:081f1bc7bd5e143dbb6e487b710bbc27712cdcfaced4c071b8e47349aa1b4171
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eve_trade
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U postgres -d eve_trade"]
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - eve_trade_pgdata:/var/lib/postgresql/data

  # This block applies the canonical SQL migrations before either service accepts traffic.
  # It exists so the test database is recreated deterministically from the same migration files the project owns.
  migrate:
    image: postgres:16@sha256:081f1bc7bd5e143dbb6e487b710bbc27712cdcfaced4c071b8e47349aa1b4171
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      PGPASSWORD: postgres
    command: >
      bash -lc "
      until psql -h postgres -U postgres -d eve_trade -v ON_ERROR_STOP=1 -c 'SELECT 1'; do
        sleep 1;
      done &&
      psql -h postgres -U postgres -d eve_trade -v ON_ERROR_STOP=1 -c 'DROP SCHEMA public CASCADE; CREATE SCHEMA public;' &&
      DATABASE_URL=postgres://postgres:postgres@postgres:5432/eve_trade bash distributed-backend/tests/migrations/verify_upgrade.sh
      "

  rabbitmq:
    image: rabbitmq:3.13.7-management@sha256:e582c0bc7766f3342496d8485efb5a1df782b5ce3886ad017e2eaae442311f69
    environment:
      RABBITMQ_DEFAULT_USER: eve_trade
      RABBITMQ_DEFAULT_PASS: eve_trade
      RABBITMQ_DEFAULT_VHOST: /
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # This block builds and runs the  Rust settlement service from the current repository checkout.
  # It exists because market must talk to the  correctness-critical service over gRPC-compatible transport.
  trade-settlement:
    build:
      context: .
      dockerfile: distributed-backend/docker/trade-settlement.Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      SUMMER_ENV: prod
      DATABASE_URL: postgres://eve_trade_runtime:runtime-password@postgres:5432/eve_trade
      OTEL_SERVICE_NAME: trade-settlement
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-false}
      OBSERVABILITY_RUN_ID: ${OBSERVABILITY_RUN_ID:-local-unobserved}
      DEPLOYMENT_ENVIRONMENT: ${OBSERVABILITY_ENV:-integration}
      SERVICE_VERSION: ${GITHUB_SHA:-local}
  # This block consumes settlement commands from RabbitMQ and forwards them to the Rust settlement service.
  # It exists so integration tests exercise the production message boundary instead of only direct gRPC.
  settlement-worker:
    build:
      context: .
      dockerfile: distributed-backend/docker/settlement-worker.Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
      trade-settlement:
        condition: service_started
    environment:
      SETTLEMENT_WORKER_HEALTH_HTTP_ADDR: :8082
      TRADE_SETTLEMENT_URL: http://trade-settlement:9092
      RABBITMQ_URL: amqp://eve_trade:eve_trade@rabbitmq:5672/
      OTEL_SERVICE_NAME: settlement-worker
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-false}
      OBSERVABILITY_RUN_ID: ${OBSERVABILITY_RUN_ID:-local-unobserved}
      DEPLOYMENT_ENVIRONMENT: ${OBSERVABILITY_ENV:-integration}
      SERVICE_VERSION: ${GITHUB_SHA:-local}
    healthcheck:
      test: ["CMD", "/app/http-healthcheck", "http://127.0.0.1:8082/readyz"]
      interval: 2s
      timeout: 2s
      retries: 30

  # This block builds and runs the  Go market service from the current repository checkout.
  # It exists so the tests cover market validation/translation plus  brokered settlement calls, not settlement alone.
  market:
    build:
      context: .
      dockerfile: distributed-backend/docker/market.Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
      settlement-worker:
        condition: service_healthy
      trade-settlement:
        condition: service_started
    environment:
      MARKET_HTTP_ADDR: :8081
      SETTLEMENT_TRANSPORT: rabbitmq
      TRADE_SETTLEMENT_URL: http://trade-settlement:9092
      RABBITMQ_URL: amqp://eve_trade:eve_trade@rabbitmq:5672/
      DATABASE_URL: postgres://eve_trade_runtime:runtime-password@postgres:5432/eve_trade
      OTEL_SERVICE_NAME: market
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-false}
      OBSERVABILITY_RUN_ID: ${OBSERVABILITY_RUN_ID:-local-unobserved}
      DEPLOYMENT_ENVIRONMENT: ${OBSERVABILITY_ENV:-integration}
      SERVICE_VERSION: ${GITHUB_SHA:-local}
    healthcheck:
      test: ["CMD", "/app/http-healthcheck", "http://127.0.0.1:8081/readyz"]
      interval: 2s
      timeout: 2s
      retries: 30

  api-gateway:
    build:
      context: .
      dockerfile: distributed-backend/docker/api-gateway.Dockerfile
    depends_on:
      market:
        condition: service_healthy
    environment:
      API_GATEWAY_HTTP_ADDR: :8080
      API_GATEWAY_QUILKIN_UDP_ADDR: :26000
      API_GATEWAY_QUILKIN_UDP_ENABLED: "true"
      API_GATEWAY_QUILKIN_WORKERS: "4"
      API_GATEWAY_QUILKIN_QUEUE_DEPTH: "64"
      API_GATEWAY_UDP_RATE_LIMIT_PER_SECOND: "100"
      API_GATEWAY_UDP_RATE_LIMIT_BURST: "200"
      API_GATEWAY_UDP_AUTH_REQUIRED: "true"
      API_GATEWAY_UDP_HMAC_SECRET: local-game-edge-secret
      API_GATEWAY_UDP_HMAC_KEY_ID: primary
      API_GATEWAY_UDP_PRINCIPAL_KEYS_JSON: '{"seller":{"capsuleer_id":1001,"secret":"seller-player-secret"},"buyer":{"capsuleer_id":2002,"secret":"buyer-player-secret"},"other":{"capsuleer_id":3003,"secret":"other-player-secret"}}'
      MARKET_URL: http://market:8081
      OTEL_SERVICE_NAME: api-gateway
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-false}
      OBSERVABILITY_RUN_ID: ${OBSERVABILITY_RUN_ID:-local-unobserved}
      DEPLOYMENT_ENVIRONMENT: ${OBSERVABILITY_ENV:-integration}
      SERVICE_VERSION: ${GITHUB_SHA:-local}
    healthcheck:
      test: ["CMD", "/app/http-healthcheck", "http://127.0.0.1:8080/readyz"]
      interval: 2s
      timeout: 2s
      retries: 30

  quilkin:
    build:
      context: .
      dockerfile: distributed-backend/docker/quilkin.Dockerfile
    image: eve-trade/quilkin:dev
    depends_on:
      api-gateway:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -ec
      - |
        endpoint="$$(getent hosts api-gateway | awk '{print $$1; exit}'):26000"
        exec /usr/local/bin/quilkin \
          --service.udp \
          --service.udp.port 26001 \
          --provider.static.endpoints "$${endpoint}" \
          --admin.enabled=false \
          --log-format json
    security_opt:
      - seccomp=unconfined
    # Quilkin's Linux UDP router allocates io_uring resources per active client
    # session. GitHub-hosted runners otherwise hit Docker's memlock ceiling and
    # start dropping simulator packets while this container still appears up.
    ulimits:
      memlock:
        soft: -1
        hard: -1

  simulator:
    build:
      context: .
      dockerfile: simulator/Dockerfile
    depends_on:
      quilkin:
        condition: service_started
    environment:
      QUILKIN_UDP_HOST: quilkin
      QUILKIN_UDP_PORT: "26001"
      QUILKIN_UDP_TIMEOUT_SECONDS: "6"
      QUILKIN_UDP_MAX_ATTEMPTS: "3"
      QUILKIN_UDP_RETRY_BACKOFF_SECONDS: "0.1"
      GAME_PACKET_HMAC_SECRET: local-game-edge-secret
      GAME_PACKET_HMAC_KEY_ID: primary
      GAME_PACKET_PRINCIPAL_KEYS_JSON: '{"1001":{"key_id":"seller","secret":"seller-player-secret"},"2002":{"key_id":"buyer","secret":"buyer-player-secret"},"3003":{"key_id":"other","secret":"other-player-secret"}}'
      SIMULATOR_ALLOWED_HOSTS: "*"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/gui/buttons/', timeout=2).read()\""]
      interval: 2s
      timeout: 2s
      retries: 30

  # This block runs the Python e2e test package inside the same Docker network as market, settlement, and PostgreSQL.
  # It exists so CI and local runs use the same network names and do not depend on host-specific service discovery.
  e2e-tests:
    image: python:3.13-slim@sha256:c33f0bc4364a6881bed1ec0cc2665e6c53c87a43e774aaeab88e6f17af105e4f
    profiles:
      - test
    depends_on:
      simulator:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - pip_cache:/root/.cache/pip
    environment:
      EVE_TRADE_API_GATEWAY_URL: http://api-gateway:8080
      EVE_TRADE_SIMULATOR_URL: http://simulator:8000
      EVE_TRADE_QUILKIN_UDP_HOST: quilkin
      EVE_TRADE_QUILKIN_UDP_PORT: "26001"
      EVE_TRADE_EDGE_RESPONSE_SECRET: local-game-edge-secret
      EVE_TRADE_EDGE_RESPONSE_KEY_ID: primary
      EVE_TRADE_EDGE_BUYER_KEY_ID: buyer
      EVE_TRADE_EDGE_BUYER_SECRET: buyer-player-secret
      EVE_TRADE_EDGE_SELLER_KEY_ID: seller
      EVE_TRADE_EDGE_SELLER_SECRET: seller-player-secret
      EVE_TRADE_LOAD_REQUESTS: "20"
      EVE_TRADE_LOAD_P95_SECONDS: "5"
      EVE_TRADE_SETTLEMENT_GRPC: trade-settlement:9092
      EVE_TRADE_GATEWAY_GRPC: api-gateway:8080
      EVE_TRADE_DATABASE_URL: postgres://postgres:postgres@postgres:5432/eve_trade
      EVE_TRADE_RUNTIME_DATABASE_URL: postgres://eve_trade_runtime:runtime-password@postgres:5432/eve_trade
      EVE_TRADE_E2E_PRODUCTION_GATE: "true"
    command: >
      sh -c "python -m pip install --retries 5 --timeout 60 -r distributed-backend/tests/e2e/requirements.txt &&
      python -c \"import re, subprocess, sys;
      proc = subprocess.run([sys.executable, '-m', 'pytest', 'distributed-backend/tests/e2e', '-q', '-rA'], stdout=subprocess.PIPE, stderr=subprocess.STDOUT, text=True);
      print(proc.stdout, end='');
      sys.exit(1 if re.search(r'(?m)^[0-9]+ skipped in ', proc.stdout) else proc.returncode)\""

  otel-collector:
    image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.153.0@sha256:93aad750175cbf1a973ae1c5886c3371f4d800f61be25cdd26870b8441ffe9fa
    profiles:
      - test
    command: ["--config=/etc/otelcol/config.yaml"]
    environment:
      OBSERVABILITY_RUN_ID: ${OBSERVABILITY_RUN_ID:-local-unobserved}
      HONEYCOMB_API_KEY: ${HONEYCOMB_API_KEY:-}
      HONEYCOMB_DATASET: ${HONEYCOMB_DATASET:-eve-trade-ci}
    volumes:
      - ${OTEL_COLLECTOR_CONFIG:-./observability/collector/otel-collector.local.yaml}:/etc/otelcol/config.yaml:ro
      - ${OTEL_LOCAL_OUTPUT_DIR:-./.o11y/collector}:/var/lib/otel

# This block stores PostgreSQL state between container restarts while still allowing full cleanup via `down -v`.
# It exists so local runs are fast, but deterministic reset is still handled by the migrate service.
volumes:
  eve_trade_pgdata:
  pip_cache:
  rabbitmq_data:
