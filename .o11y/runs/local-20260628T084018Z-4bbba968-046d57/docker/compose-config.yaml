name: eve-trade-integration
services:
  api-gateway:
    build:
      context: C:\Users\Astral\Desktop\eve-trade
      dockerfile: distributed-backend/docker/api-gateway.Dockerfile
    depends_on:
      market:
        condition: service_healthy
        required: true
    environment:
      API_GATEWAY_HTTP_ADDR: :8080
      API_GATEWAY_QUILKIN_QUEUE_DEPTH: "64"
      API_GATEWAY_QUILKIN_UDP_ADDR: :26000
      API_GATEWAY_QUILKIN_UDP_ENABLED: "true"
      API_GATEWAY_QUILKIN_WORKERS: "4"
      API_GATEWAY_UDP_AUTH_REQUIRED: <redacted:present>
      API_GATEWAY_UDP_HMAC_KEY_ID: <redacted:present>
      API_GATEWAY_UDP_HMAC_SECRET: <redacted:present>
      API_GATEWAY_UDP_RATE_LIMIT_BURST: "200"
      API_GATEWAY_UDP_RATE_LIMIT_PER_SECOND: "100"
      DEPLOYMENT_ENVIRONMENT: integration
      MARKET_URL: http://market:8081
      OBSERVABILITY_RUN_ID: local-20260628T084018Z-4bbba968-046d57
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SDK_DISABLED: "false"
      OTEL_SERVICE_NAME: api-gateway
      SERVICE_VERSION: local
    healthcheck:
      test:
        - CMD
        - /app/http-healthcheck
        - http://127.0.0.1:8080/readyz
      timeout: 2s
      interval: 2s
      retries: 30
    networks:
      default: null
  e2e-tests:
    profiles:
      - test
    command:
      - sh
      - -c
      - python -m pip install --retries 5 --timeout 60 -r distributed-backend/tests/e2e/requirements.txt && python -c "import re, subprocess, sys; proc = subprocess.run([sys.executable, '-m', 'pytest', 'distributed-backend/tests/e2e', '-q', '-rA'], stdout=subprocess.PIPE, stderr=subprocess.STDOUT, text=True); print(proc.stdout, end=''); sys.exit(1 if re.search(r'(?m)^[0-9]+ skipped in ', proc.stdout) else proc.returncode)"
    depends_on:
      simulator:
        condition: service_healthy
        required: true
    environment:
      EVE_TRADE_API_GATEWAY_URL: http://api-gateway:8080
      EVE_TRADE_DATABASE_URL: postgres://<redacted>@postgres:5432/eve_trade
      EVE_TRADE_GATEWAY_GRPC: api-gateway:8080
      EVE_TRADE_SETTLEMENT_GRPC: trade-settlement:9092
      EVE_TRADE_SIMULATOR_URL: http://simulator:8000
    image: python:3.13-slim
    networks:
      default: null
    volumes:
      - type: bind
        source: C:\Users\Astral\Desktop\eve-trade
        target: /workspace
        bind: {}
      - type: volume
        source: pip_cache
        target: /root/.cache/pip
        volume: {}
    working_dir: /workspace
  market:
    build:
      context: C:\Users\Astral\Desktop\eve-trade
      dockerfile: distributed-backend/docker/market.Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
        required: true
      settlement-worker:
        condition: service_healthy
        required: true
      trade-settlement:
        condition: service_started
        required: true
    environment:
      DATABASE_URL: postgres://<redacted>@postgres:5432/eve_trade
      DEPLOYMENT_ENVIRONMENT: integration
      MARKET_HTTP_ADDR: :8081
      OBSERVABILITY_RUN_ID: local-20260628T084018Z-4bbba968-046d57
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SDK_DISABLED: "false"
      OTEL_SERVICE_NAME: market
      RABBITMQ_URL: amqp://<redacted>@rabbitmq:5672/
      SERVICE_VERSION: local
      SETTLEMENT_TRANSPORT: rabbitmq
      TRADE_SETTLEMENT_URL: http://trade-settlement:9092
    healthcheck:
      test:
        - CMD
        - /app/http-healthcheck
        - http://127.0.0.1:8081/readyz
      timeout: 2s
      interval: 2s
      retries: 30
    networks:
      default: null
  migrate:
    command:
      - bash
      - -lc
      - " until psql -h postgres -U postgres -d eve_trade -v ON_ERROR_STOP=1 -c 'SELECT 1'; do\n  sleep 1;\ndone && psql -h postgres -U postgres -d eve_trade -v ON_ERROR_STOP=1 -c 'DROP SCHEMA public CASCADE; CREATE SCHEMA public;' && psql -h postgres -U postgres -d eve_trade -v ON_ERROR_STOP=1 -f distributed-backend/src/trade-settlement/migrations/0001_settlement_schema.sql "
    depends_on:
      postgres:
        condition: service_healthy
        required: true
    environment:
      PGPASSWORD: <redacted:present>
    image: postgres:16
    networks:
      default: null
    volumes:
      - type: bind
        source: C:\Users\Astral\Desktop\eve-trade
        target: /workspace
        bind: {}
    working_dir: /workspace
  otel-collector:
    profiles:
      - test
    command:
      - --config=/etc/otelcol/config.yaml
    environment:
      HONEYCOMB_API_KEY: <redacted:present>
      HONEYCOMB_DATASET: eve-trade-ci
      OBSERVABILITY_RUN_ID: local-20260628T084018Z-4bbba968-046d57
    image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.153.0@sha256:93aad750175cbf1a973ae1c5886c3371f4d800f61be25cdd26870b8441ffe9fa
    networks:
      default: null
    volumes:
      - type: bind
        source: C:\Users\Astral\Desktop\eve-trade\observability\collector\otel-collector.local.yaml
        target: /etc/otelcol/config.yaml
        read_only: true
        bind: {}
      - type: bind
        source: C:/Users/Astral/Desktop/eve-trade/.o11y/runs/local-20260628T084018Z-4bbba968-046d57/telemetry/collector-live
        target: /var/lib/otel
        bind: {}
  postgres:
    environment:
      POSTGRES_DB: eve_trade
      POSTGRES_PASSWORD: <redacted:present>
      POSTGRES_USER: postgres
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -h 127.0.0.1 -U postgres -d eve_trade
      timeout: 2s
      interval: 2s
      retries: 30
    image: postgres:16
    networks:
      default: null
    volumes:
      - type: volume
        source: eve_trade_pgdata
        target: /var/lib/postgresql/data
        volume: {}
  quilkin:
    build:
      context: C:\Users\Astral\Desktop\eve-trade
      dockerfile: distributed-backend/docker/quilkin.Dockerfile
    depends_on:
      api-gateway:
        condition: service_healthy
        required: true
    entrypoint:
      - /bin/sh
      - -ec
      - |
        endpoint="$$(getent hosts api-gateway | awk '{print $$1; exit}'):26000"
        exec /usr/local/bin/quilkin \
          --service.udp \
          --service.udp.port 26001 \
          --provider.static.endpoints "$${endpoint}" \
          --admin.enabled=false \
          --log-format json
    image: eve-trade/quilkin:dev
    networks:
      default: null
    security_opt:
      - seccomp=unconfined
  rabbitmq:
    environment:
      RABBITMQ_DEFAULT_PASS: eve_trade
      RABBITMQ_DEFAULT_USER: eve_trade
      RABBITMQ_DEFAULT_VHOST: /
    healthcheck:
      test:
        - CMD-SHELL
        - rabbitmq-diagnostics -q ping
      timeout: 5s
      interval: 5s
      retries: 30
    image: rabbitmq:3.13.7-management
    networks:
      default: null
    volumes:
      - type: volume
        source: rabbitmq_data
        target: /var/lib/rabbitmq
        volume: {}
  settlement-worker:
    build:
      context: C:\Users\Astral\Desktop\eve-trade
      dockerfile: distributed-backend/docker/settlement-worker.Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
        required: true
      trade-settlement:
        condition: service_started
        required: true
    environment:
      DEPLOYMENT_ENVIRONMENT: integration
      OBSERVABILITY_RUN_ID: local-20260628T084018Z-4bbba968-046d57
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SDK_DISABLED: "false"
      OTEL_SERVICE_NAME: settlement-worker
      RABBITMQ_URL: amqp://<redacted>@rabbitmq:5672/
      SERVICE_VERSION: local
      SETTLEMENT_WORKER_HEALTH_HTTP_ADDR: :8082
      TRADE_SETTLEMENT_URL: http://trade-settlement:9092
    healthcheck:
      test:
        - CMD
        - /app/http-healthcheck
        - http://127.0.0.1:8082/readyz
      timeout: 2s
      interval: 2s
      retries: 30
    networks:
      default: null
  simulator:
    build:
      context: C:\Users\Astral\Desktop\eve-trade
      dockerfile: simulator/Dockerfile
    depends_on:
      quilkin:
        condition: service_started
        required: true
    environment:
      GAME_PACKET_HMAC_KEY_ID: <redacted:present>
      GAME_PACKET_HMAC_SECRET: <redacted:present>
      QUILKIN_UDP_HOST: quilkin
      QUILKIN_UDP_MAX_ATTEMPTS: "3"
      QUILKIN_UDP_PORT: "26001"
      QUILKIN_UDP_RETRY_BACKOFF_SECONDS: "0.1"
      QUILKIN_UDP_TIMEOUT_SECONDS: "6"
      SIMULATOR_ALLOWED_HOSTS: '*'
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/gui/buttons/', timeout=2).read()"
      timeout: 2s
      interval: 2s
      retries: 30
    networks:
      default: null
  trade-settlement:
    build:
      context: C:\Users\Astral\Desktop\eve-trade
      dockerfile: distributed-backend/docker/trade-settlement.Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
        required: true
    environment:
      DATABASE_URL: postgres://<redacted>@postgres:5432/eve_trade
      DEPLOYMENT_ENVIRONMENT: integration
      OBSERVABILITY_RUN_ID: local-20260628T084018Z-4bbba968-046d57
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SDK_DISABLED: "false"
      OTEL_SERVICE_NAME: trade-settlement
      SERVICE_VERSION: local
      SUMMER_ENV: prod
    networks:
      default: null
networks:
  default:
    name: eve-trade-integration_default
volumes:
  eve_trade_pgdata:
    name: eve-trade-integration_eve_trade_pgdata
  pip_cache:
    name: eve-trade-integration_pip_cache
  rabbitmq_data:
    name: eve-trade-integration_rabbitmq_data
