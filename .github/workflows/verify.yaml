name: verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  proto:
    name: proto / buf
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: distributed-backend/proto/go.mod
          cache: true

      - name: Install Buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true
          version: "1.70.0"

      - name: Install local protobuf plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install connectrpc.com/connect/cmd/protoc-gen-connect-go@v1.20.0

      - name: Check protobuf module builds
        run: buf build --error-format github-actions

      - name: Lint protobuf contracts
        run: buf lint --error-format github-actions

      - name: Check protobuf formatting
        run: buf format --diff --exit-code

      - name: Regenerate protobuf output
        run: buf generate

      - name: Fail if generated protobuf code is stale
        run: git diff --exit-code -- distributed-backend/proto/gen

  go:
    name: go / ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: proto
            module: distributed-backend/proto
            build_package: ""
          - name: observability
            module: distributed-backend/src/observability
            build_package: ""
          - name: market
            module: distributed-backend/src/market
            build_package: ./cmd/market
          - name: api-gateway
            module: distributed-backend/src/api-gateway
            build_package: ./cmd/api-gateway

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache: true

      - name: Check Go module metadata
        working-directory: ${{ matrix.module }}
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Check Go formatting
        working-directory: ${{ matrix.module }}
        shell: bash
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "Go files are not formatted:"
            echo "$files"
            exit 1
          fi

      - name: Test Go packages
        working-directory: ${{ matrix.module }}
        run: go test ./...

      - name: Build service
        if: matrix.build_package != ''
        working-directory: ${{ matrix.module }}
        run: go build -o /tmp/eve-trade-${{ matrix.name }} ${{ matrix.build_package }}

  rust-trade-settlement:
    name: rust / trade-settlement
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: distributed-backend/src/trade-settlement

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Check Rust build
        run: cargo check --locked

      - name: Test Rust crate
        run: cargo test --locked

      - name: Lint Rust crate
        run: cargo clippy --locked --all-targets -- -D warnings
