name: verify

on:
  push:
    branches: [main, experimental]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  ENCORE_CLI_VERSION: "1.57.9"

jobs:
  proto:
    name: proto / buf
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1
        with:
          setup_only: true
          version: "1.70.0"
      - name: Install protobuf plugin
        run: go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
      - run: buf build --error-format github-actions
      - run: buf lint --error-format github-actions
      - run: buf format --diff --exit-code
      - if: github.event_name == 'pull_request'
        run: buf breaking --against '.git#branch=main'
      - run: buf generate
      - run: git diff --exit-code -- proto/gen

  go:
    name: go / encore
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    needs: [proto]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install Encore CLI
        run: |
          curl -fsSL https://encore.dev/install.sh | bash -s -- --version "$ENCORE_CLI_VERSION" || {
            mkdir -p "$HOME/.encore/bin"
            GOBIN="$HOME/.encore/bin" go install "encr.dev/cli/cmd/encore@v$ENCORE_CLI_VERSION"
          }
          echo "$HOME/.encore/bin" >> "$GITHUB_PATH"
      - run: encore version
      - name: Check Go module metadata
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
      - name: Check Go formatting
        run: |
          files="$(gofmt -l distributed-backend/src/gateway distributed-backend/src/market distributed-backend/src/settlement distributed-backend/src/settlementworker distributed-backend/internal gametrade proto/gen go_modules_test.go)"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi
      - run: encore test ./...
      - run: go vet ./...
      - name: Fuzz UDP authentication parser
        run: encore test -run '^$' -fuzz '^FuzzAuthenticatedPayload' -fuzztime 10s ./distributed-backend/src/gateway
      - name: Build Encore image
        run: encore build docker --config infra/encore/self-host.nsq.json eve-trade/encore-backend:${{ github.sha }}

  rust-trade-settlement:
    name: rust / trade-settlement
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    defaults:
      run:
        working-directory: distributed-backend/src/trade-settlement
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo fmt --all -- --check
      - run: cargo check --locked --all-targets --all-features
      - run: cargo test --locked --all-features
      - run: cargo clippy --locked --all-targets --all-features -- -D warnings

  terraform:
    name: terraform / ${{ matrix.provider }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - provider: eks
            root: distributed-backend/terraform/eks
          - provider: gke
            root: distributed-backend/terraform/gke
          - provider: talos-omni
            root: distributed-backend/terraform/talos-omni
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: 1.10.5
      - run: terraform fmt -check -recursive distributed-backend/terraform
      - run: terraform -chdir=${{ matrix.root }} init -backend=false
      - run: terraform -chdir=${{ matrix.root }} validate
      - run: terraform -chdir=${{ matrix.root }} test

  kubernetes:
    name: kubernetes / render
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5
        with:
          version: v1.33.0
      - name: Render manifests
        run: |
          kubectl kustomize distributed-backend/orchestration/kubernetes/platform/istio/prod >/tmp/eve-trade-istio.yaml
          kubectl kustomize distributed-backend/orchestration/kubernetes/platform/gateway/prod >/tmp/eve-trade-gateway.yaml
          kubectl kustomize distributed-backend/orchestration/kubernetes/base/observability >/tmp/eve-trade-observability.yaml
          kubectl kustomize distributed-backend/orchestration/kubernetes/overlay/local >/tmp/eve-trade-local.yaml
          kubectl kustomize distributed-backend/orchestration/kubernetes/overlay/prod >/tmp/eve-trade-prod.yaml
          kubectl kustomize distributed-backend/orchestration/kubernetes/chaos/litmus/overlays/prod >/tmp/eve-trade-chaos.yaml
      - run: python scripts/verify_rendered_kubernetes.py /tmp/eve-trade-prod.yaml

  python:
    name: python / simulator and observability
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - run: python -m compileall simulator/eve_trade_simulator simulator/trade_gui distributed-backend/tests/e2e distributed-backend/observability
      - working-directory: simulator
        run: |
          python -m pip install -r requirements-test.txt
          python -m coverage run --rcfile=.coveragerc manage.py test trade_gui
          python -m coverage report --rcfile=.coveragerc --fail-under=80
      - run: |
          python -m pip install -r distributed-backend/observability/requirements-test.txt
          PYTHONPATH=distributed-backend python -m coverage run --rcfile=distributed-backend/observability/.coveragerc -m unittest discover -s distributed-backend/observability/tests -v
          python -m coverage report --rcfile=distributed-backend/observability/.coveragerc --fail-under=35

  e2e:
    name: e2e / observed
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: [go, rust-trade-settlement, kubernetes, python]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - run: python -m pip install -r distributed-backend/observability/requirements.txt
      - name: Run observed integration tests
        env:
          OBSERVABILITY_ENV: github-actions
          OBSERVABILITY_STRICT: "true"
          HONEYCOMB_API_KEY: ${{ secrets.HONEYCOMB_API_KEY }}
          HONEYCOMB_CONFIGURATION_KEY: ${{ secrets.HONEYCOMB_CONFIGURATION_KEY }}
          HONEYCOMB_DATASET: eve-trade-ci
          OTEL_COLLECTOR_CONFIG: ${{ secrets.HONEYCOMB_API_KEY != '' && './distributed-backend/observability/collector/otel-collector.honeycomb.yaml' || './distributed-backend/observability/collector/otel-collector.local.yaml' }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: python distributed-backend/observability/ci/observed_run.py integration --clean

  o11y-aggregate:
    name: o11y / aggregate
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    if: ${{ always() }}
    needs: [proto, go, rust-trade-settlement, terraform, kubernetes, python, e2e]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - name: Aggregate observed CI evidence
        id: aggregate
        continue-on-error: true
        env:
          OBSERVABILITY_ENV: github-actions
          OBS_CI_NEEDS_JSON: ${{ toJson(needs) }}
        run: python distributed-backend/observability/ci/ci_aggregate.py
      - name: Upload aggregate evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: o11y-aggregate-${{ github.run_id }}-${{ github.run_attempt }}
          path: .o11y/runs/**
          if-no-files-found: warn
      - name: Fail if aggregate found failed or incomplete jobs
        if: ${{ steps.aggregate.outcome == 'failure' }}
        run: exit 1
