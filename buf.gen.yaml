version: v2

clean: true

managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/QuasarRay/eve-trade/distributed-backend/proto/gen

plugins:
  - local: protoc-gen-go
    out: distributed-backend/proto/gen
    opt:
      - paths=source_relative

  - local: protoc-gen-connect-go
    out: distributed-backend/proto/gen
    opt:
      - paths=source_relative
