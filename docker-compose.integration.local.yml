services:
  postgres:
    ports: !reset []

  rabbitmq:
    ports: !reset []

  trade-settlement:
    build:
      dockerfile: distributed-backend/docker/trade-settlement.local.Dockerfile

  settlement-worker:
    build:
      dockerfile: distributed-backend/docker/go-service.local.Dockerfile
      args:
        SERVICE_BINARY: settlement-worker
        SERVICE_PORT: "8082"

  market:
    build:
      dockerfile: distributed-backend/docker/go-service.local.Dockerfile
      args:
        SERVICE_BINARY: market
        SERVICE_PORT: "8081"

  api-gateway:
    build:
      dockerfile: distributed-backend/docker/go-service.local.Dockerfile
      args:
        SERVICE_BINARY: api-gateway
        SERVICE_PORT: "8080"
    ports: !override
      - "127.0.0.1:26000:26000/udp"
