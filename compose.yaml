name: eve-trade

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eve_trade
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eve_trade"]
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - eve_trade_pgdata:/var/lib/postgresql/data

  migrate:
    image: postgres:16
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      PGPASSWORD: postgres
    command: >
      bash -lc "
      if psql -h postgres -U postgres -d eve_trade -tAc \"SELECT to_regclass('public.trade_instance')\" | grep -q trade_instance; then
        echo 'Database schema already exists; applying compatible local migrations and leaving local data intact.';
        psql -h postgres -U postgres -d eve_trade -v ON_ERROR_STOP=1 -f distributed-backend/src/trade-settlement/migrations/0002_merge_item_stack_constraints.sql;
      else
        psql -h postgres -U postgres -d eve_trade -v ON_ERROR_STOP=1 -f distributed-backend/src/trade-settlement/migrations/0001_settlement_schema.sql;
        psql -h postgres -U postgres -d eve_trade -v ON_ERROR_STOP=1 -f distributed-backend/src/trade-settlement/migrations/0002_merge_item_stack_constraints.sql;
      fi
      psql -h postgres -U postgres -d eve_trade -v ON_ERROR_STOP=1 -f distributed-backend/src/trade-settlement/seeds/local_dev_world.sql;
      "

  rabbitmq:
    image: rabbitmq:3.13.7-management
    environment:
      RABBITMQ_DEFAULT_USER: eve_trade
      RABBITMQ_DEFAULT_PASS: eve_trade
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - eve_trade_rabbitmq:/var/lib/rabbitmq

  trade-settlement:
    build:
      context: .
      dockerfile: distributed-backend/docker/trade-settlement.Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      SUMMER_ENV: prod
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/eve_trade
  settlement-worker:
    build:
      context: .
      dockerfile: distributed-backend/docker/settlement-worker.Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
      trade-settlement:
        condition: service_started
    environment:
      SETTLEMENT_WORKER_HEALTH_HTTP_ADDR: :8082
      TRADE_SETTLEMENT_URL: http://trade-settlement:9092
      RABBITMQ_URL: amqp://eve_trade:eve_trade@rabbitmq:5672/
      OTEL_SDK_DISABLED: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8082/readyz >/dev/null"]
      interval: 2s
      timeout: 2s
      retries: 30

  market:
    build:
      context: .
      dockerfile: distributed-backend/docker/market.Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
      settlement-worker:
        condition: service_healthy
      trade-settlement:
        condition: service_started
    environment:
      MARKET_HTTP_ADDR: :8081
      SETTLEMENT_TRANSPORT: rabbitmq
      TRADE_SETTLEMENT_URL: http://trade-settlement:9092
      RABBITMQ_URL: amqp://eve_trade:eve_trade@rabbitmq:5672/
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/eve_trade
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8081/healthz >/dev/null"]
      interval: 2s
      timeout: 2s
      retries: 30

  api-gateway:
    build:
      context: .
      dockerfile: distributed-backend/docker/api-gateway.Dockerfile
    depends_on:
      market:
        condition: service_healthy
    environment:
      API_GATEWAY_HTTP_ADDR: :8080
      MARKET_URL: http://market:8081
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/healthz >/dev/null"]
      interval: 2s
      timeout: 2s
      retries: 30

volumes:
  eve_trade_pgdata:
  eve_trade_rabbitmq:
