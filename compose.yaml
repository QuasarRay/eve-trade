name: eve-trade

services:
  postgres:
    image: postgres:16@sha256:081f1bc7bd5e143dbb6e487b710bbc27712cdcfaced4c071b8e47349aa1b4171
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eve_trade
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eve_trade"]
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - eve_trade_pgdata:/var/lib/postgresql/data

  migrate:
    image: postgres:16@sha256:081f1bc7bd5e143dbb6e487b710bbc27712cdcfaced4c071b8e47349aa1b4171
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      PGPASSWORD: postgres
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/eve_trade
    command: >
      bash -lc "
      until psql -h postgres -U postgres -d eve_trade -v ON_ERROR_STOP=1 -c 'SELECT 1'; do
        sleep 1;
      done &&
      bash distributed-backend/tests/migrations/verify_upgrade.sh;
      psql -h postgres -U postgres -d eve_trade -v ON_ERROR_STOP=1 -f distributed-backend/src/trade-settlement/seeds/local_dev_world.sql;
      "

  rabbitmq:
    image: rabbitmq:3.13.7-management@sha256:e582c0bc7766f3342496d8485efb5a1df782b5ce3886ad017e2eaae442311f69
    environment:
      RABBITMQ_DEFAULT_USER: eve_trade
      RABBITMQ_DEFAULT_PASS: eve_trade
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - eve_trade_rabbitmq:/var/lib/rabbitmq

  trade-settlement:
    build:
      context: .
      dockerfile: distributed-backend/docker/trade-settlement.Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      SUMMER_ENV: prod
      DATABASE_URL: postgres://eve_trade_runtime:runtime-password@postgres:5432/eve_trade
      OTEL_SERVICE_NAME: trade-settlement
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-true}
      OBSERVABILITY_RUN_ID: ${OBSERVABILITY_RUN_ID:-local-unobserved}
  settlement-worker:
    build:
      context: .
      dockerfile: distributed-backend/docker/settlement-worker.Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
      trade-settlement:
        condition: service_started
    environment:
      SETTLEMENT_WORKER_HEALTH_HTTP_ADDR: :8082
      TRADE_SETTLEMENT_URL: http://trade-settlement:9092
      RABBITMQ_URL: amqp://eve_trade:eve_trade@rabbitmq:5672/
      OTEL_SERVICE_NAME: settlement-worker
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-true}
      OBSERVABILITY_RUN_ID: ${OBSERVABILITY_RUN_ID:-local-unobserved}
    healthcheck:
      test: ["CMD", "/app/http-healthcheck", "http://127.0.0.1:8082/readyz"]
      interval: 2s
      timeout: 2s
      retries: 30

  market:
    build:
      context: .
      dockerfile: distributed-backend/docker/market.Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
      settlement-worker:
        condition: service_healthy
      trade-settlement:
        condition: service_started
    environment:
      MARKET_HTTP_ADDR: :8081
      SETTLEMENT_TRANSPORT: rabbitmq
      TRADE_SETTLEMENT_URL: http://trade-settlement:9092
      RABBITMQ_URL: amqp://eve_trade:eve_trade@rabbitmq:5672/
      DATABASE_URL: postgres://eve_trade_runtime:runtime-password@postgres:5432/eve_trade
      OTEL_SERVICE_NAME: market
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-true}
      OBSERVABILITY_RUN_ID: ${OBSERVABILITY_RUN_ID:-local-unobserved}
    healthcheck:
      test: ["CMD", "/app/http-healthcheck", "http://127.0.0.1:8081/readyz"]
      interval: 2s
      timeout: 2s
      retries: 30

  api-gateway:
    build:
      context: .
      dockerfile: distributed-backend/docker/api-gateway.Dockerfile
    depends_on:
      market:
        condition: service_healthy
    environment:
      API_GATEWAY_HTTP_ADDR: :8080
      API_GATEWAY_QUILKIN_UDP_ADDR: :26000
      API_GATEWAY_QUILKIN_WORKERS: "4"
      API_GATEWAY_QUILKIN_QUEUE_DEPTH: "64"
      API_GATEWAY_UDP_RATE_LIMIT_PER_SECOND: "100"
      API_GATEWAY_UDP_RATE_LIMIT_BURST: "200"
      API_GATEWAY_UDP_AUTH_REQUIRED: "true"
      API_GATEWAY_UDP_HMAC_SECRET: local-game-edge-secret
      API_GATEWAY_UDP_HMAC_KEY_ID: primary
      API_GATEWAY_UDP_PRINCIPAL_KEYS_JSON: '{"seller":{"capsuleer_id":1001,"secret":"seller-player-secret"},"buyer":{"capsuleer_id":2002,"secret":"buyer-player-secret"},"other":{"capsuleer_id":3003,"secret":"other-player-secret"}}'
      MARKET_URL: http://market:8081
      OTEL_SERVICE_NAME: api-gateway
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-true}
      OBSERVABILITY_RUN_ID: ${OBSERVABILITY_RUN_ID:-local-unobserved}
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "/app/http-healthcheck", "http://127.0.0.1:8080/readyz"]
      interval: 2s
      timeout: 2s
      retries: 30

  quilkin:
    build:
      context: .
      dockerfile: distributed-backend/docker/quilkin.Dockerfile
    image: eve-trade/quilkin:dev
    depends_on:
      api-gateway:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - |
        endpoint="$$(getent hosts api-gateway | awk '{print $$1; exit}'):26000"
        # Quilkin 0.10.0 can race while reserving upstream sockets when several
        # proxy workers create sessions for one endpoint. One ingress worker
        # prevents cross-client response routing; API work remains concurrent.
        exec /usr/local/bin/quilkin \
          --service.udp \
          --service.udp.port 26001 \
          --service.udp.workers 1 \
          --provider.static.endpoints "$${endpoint}" \
          --admin.enabled=false \
          --log-format json
    security_opt:
      - seccomp=unconfined
    # Quilkin 0.10 creates an io_uring-backed upstream socket for each active
    # UDP client session. Docker's default locked-memory limit is exhausted by
    # the short-lived client sockets used by the simulator/e2e suite, after
    # which Quilkin silently drops new sessions while the container stays up.
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "127.0.0.1:26001:26001/udp"

  simulator:
    build:
      context: .
      dockerfile: simulator/Dockerfile
    depends_on:
      quilkin:
        condition: service_started
    environment:
      QUILKIN_UDP_HOST: quilkin
      QUILKIN_UDP_PORT: "26001"
      QUILKIN_UDP_TIMEOUT_SECONDS: "6"
      QUILKIN_UDP_MAX_ATTEMPTS: "3"
      QUILKIN_UDP_RETRY_BACKOFF_SECONDS: "0.1"
      GAME_PACKET_HMAC_SECRET: local-game-edge-secret
      GAME_PACKET_HMAC_KEY_ID: primary
      GAME_PACKET_PRINCIPAL_KEYS_JSON: '{"1001":{"key_id":"seller","secret":"seller-player-secret"},"2002":{"key_id":"buyer","secret":"buyer-player-secret"},"3003":{"key_id":"other","secret":"other-player-secret"}}'
      SIMULATOR_ALLOWED_HOSTS: "*"
    ports:
      - "127.0.0.1:8000:8000"

  otel-collector:
    image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.153.0@sha256:93aad750175cbf1a973ae1c5886c3371f4d800f61be25cdd26870b8441ffe9fa
    profiles:
      - observability
    command: ["--config=/etc/otelcol/config.yaml"]
    environment:
      OBSERVABILITY_RUN_ID: ${OBSERVABILITY_RUN_ID:-local-unobserved}
      HONEYCOMB_API_KEY: ${HONEYCOMB_API_KEY:-}
      HONEYCOMB_DATASET: ${HONEYCOMB_DATASET:-eve-trade-ci}
    volumes:
      - ${OTEL_COLLECTOR_CONFIG:-./observability/collector/otel-collector.local.yaml}:/etc/otelcol/config.yaml:ro
      - ${OTEL_LOCAL_OUTPUT_DIR:-./.o11y/collector}:/var/lib/otel
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
      - "127.0.0.1:13133:13133"

volumes:
  eve_trade_pgdata:
  eve_trade_rabbitmq:
