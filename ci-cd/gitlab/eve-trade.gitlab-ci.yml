workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH'

stages:
  - validate
  - test
  - build
  - publish
  - deploy
  - chaos

variables:
  DAGGER_VERSION: "0.21.7"
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  CHAOS_NAMESPACE: eve-trade
  CHAOS_SELECTOR: "chaos.eve-trade.io/suite=pod-resilience"
  CHAOS_TIMEOUT_SECONDS: "900"
  DEPLOY_ENVIRONMENT: production
  EVE_TRADE_CLOUD_PROVIDER: aws
  # Supported values: aws, gcp, talos-omni.
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  _EXPERIMENTAL_DAGGER_CLI_BIN: /usr/local/bin/dagger

.dagger:
  image: docker:29.5.2-cli
  services:
    - name: docker:29.5.2-dind
      command: ["--tls=false"]
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - .cache/pip
  before_script:
    - apk add --no-cache curl python3 py3-pip
    - python3 -m venv .ci-venv
    - . .ci-venv/bin/activate
    - pip install --upgrade pip
    - pip install -r ci-cd/requirements.txt
    - curl -fsSLo /tmp/dagger.tar.gz "https://github.com/dagger/dagger/releases/download/v${DAGGER_VERSION}/dagger_v${DAGGER_VERSION}_linux_amd64.tar.gz"
    - tar -C /usr/local/bin -xzf /tmp/dagger.tar.gz dagger
    - chmod +x /usr/local/bin/dagger
    - dagger version

validate:check:
  extends: .dagger
  stage: validate
  script:
    - . .ci-venv/bin/activate
    - python ci-cd/pipeline.py check

validate:chaos:
  extends: .dagger
  stage: validate
  script:
    - . .ci-venv/bin/activate
    - mkdir -p ci-cd/out
    - python ci-cd/pipeline.py render-chaos --output ci-cd/out/chaos-litmus.yaml
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - ci-cd/out/chaos-litmus.yaml

test:unit:
  extends: .dagger
  stage: test
  needs:
    - validate:check
  script:
    - . .ci-venv/bin/activate
    - python ci-cd/pipeline.py test

test:e2e:
  extends: .dagger
  stage: test
  needs:
    - validate:check
  script:
    - . .ci-venv/bin/activate
    - python ci-cd/pipeline.py integration

build:images:
  extends: .dagger
  stage: build
  needs:
    - test:unit
    - test:e2e
  script:
    - . .ci-venv/bin/activate
    - python ci-cd/pipeline.py build --tag "$IMAGE_TAG"

publish:images:
  extends: .dagger
  stage: publish
  needs:
    - build:images
  rules:
    - if: '$CI_COMMIT_TAG'
      variables:
        IMAGE_TAG: "$CI_COMMIT_TAG"
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - . .ci-venv/bin/activate
    - python ci-cd/pipeline.py publish --cloud-provider "$EVE_TRADE_CLOUD_PROVIDER" --tag "$IMAGE_TAG"

deploy:render:
  extends: .dagger
  stage: deploy
  needs:
    - publish:images
  rules:
    - if: '$CI_COMMIT_TAG'
      variables:
        IMAGE_TAG: "$CI_COMMIT_TAG"
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - . .ci-venv/bin/activate
    - mkdir -p ci-cd/out
    - python ci-cd/pipeline.py render-kubernetes --cloud-provider "$EVE_TRADE_CLOUD_PROVIDER" --tag "$IMAGE_TAG" --output ci-cd/out/kubernetes.yaml
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - ci-cd/out/kubernetes.yaml

deploy:production:
  extends: .dagger
  stage: deploy
  needs:
    - deploy:render
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $RUN_PRODUCTION_CHAOS == "true"'
      when: never
    - if: '$CI_COMMIT_TAG'
      when: manual
      variables:
        IMAGE_TAG: "$CI_COMMIT_TAG"
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
  environment:
    name: $DEPLOY_ENVIRONMENT
  script:
    - . .ci-venv/bin/activate
    - python ci-cd/pipeline.py deploy --cloud-provider "$EVE_TRADE_CLOUD_PROVIDER" --tag "$IMAGE_TAG"

chaos:production:
  extends: .dagger
  stage: chaos
  allow_failure: false
  interruptible: false
  timeout: 30m
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $RUN_PRODUCTION_CHAOS == "true"'
      when: on_success
    - if: '$CI_COMMIT_TAG'
      when: manual
      variables:
        IMAGE_TAG: "$CI_COMMIT_TAG"
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
  resource_group: production-chaos
  environment:
    name: $DEPLOY_ENVIRONMENT
    action: verify
  script:
    - . .ci-venv/bin/activate
    - python ci-cd/pipeline.py chaos --namespace "$CHAOS_NAMESPACE" --selector "$CHAOS_SELECTOR" --timeout-seconds "$CHAOS_TIMEOUT_SECONDS"
