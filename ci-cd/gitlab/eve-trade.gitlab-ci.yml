workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH'

stages:
  - validate
  - test
  - build
  - publish
  - deploy

variables:
  DAGGER_VERSION: "0.21.6"
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  DEPLOY_ENVIRONMENT: production
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  _EXPERIMENTAL_DAGGER_CLI_BIN: /usr/local/bin/dagger

.dagger:
  image: docker:27.2.0-cli
  services:
    - name: docker:27.2.0-dind
      command: ["--tls=false"]
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - .cache/pip
  before_script:
    - apk add --no-cache curl python3 py3-pip
    - python3 -m venv .ci-venv
    - . .ci-venv/bin/activate
    - pip install --upgrade pip
    - pip install -r ci-cd/requirements.txt
    - curl -fsSLo /tmp/dagger.tar.gz "https://github.com/dagger/dagger/releases/download/v${DAGGER_VERSION}/dagger_v${DAGGER_VERSION}_linux_amd64.tar.gz"
    - tar -C /usr/local/bin -xzf /tmp/dagger.tar.gz dagger
    - chmod +x /usr/local/bin/dagger
    - dagger version

validate:check:
  extends: .dagger
  stage: validate
  script:
    - . .ci-venv/bin/activate
    - python ci-cd/pipeline.py check

test:unit:
  extends: .dagger
  stage: test
  needs:
    - validate:check
  script:
    - . .ci-venv/bin/activate
    - python ci-cd/pipeline.py test

test:e2e:
  extends: .dagger
  stage: test
  needs:
    - validate:check
  script:
    - . .ci-venv/bin/activate
    - python ci-cd/pipeline.py integration

build:images:
  extends: .dagger
  stage: build
  needs:
    - test:unit
    - test:e2e
  script:
    - . .ci-venv/bin/activate
    - python ci-cd/pipeline.py build --tag "$IMAGE_TAG"

publish:images:
  extends: .dagger
  stage: publish
  needs:
    - build:images
  rules:
    - if: '$CI_COMMIT_TAG'
      variables:
        IMAGE_TAG: "$CI_COMMIT_TAG"
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - . .ci-venv/bin/activate
    - python ci-cd/pipeline.py publish --tag "$IMAGE_TAG"

deploy:render:
  extends: .dagger
  stage: deploy
  needs:
    - publish:images
  rules:
    - if: '$CI_COMMIT_TAG'
      variables:
        IMAGE_TAG: "$CI_COMMIT_TAG"
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - . .ci-venv/bin/activate
    - mkdir -p ci-cd/out
    - python ci-cd/pipeline.py render-kubernetes --tag "$IMAGE_TAG" --output ci-cd/out/kubernetes.yaml
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - ci-cd/out/kubernetes.yaml

deploy:production:
  extends: .dagger
  stage: deploy
  needs:
    - deploy:render
  rules:
    - if: '$CI_COMMIT_TAG'
      when: manual
      variables:
        IMAGE_TAG: "$CI_COMMIT_TAG"
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
  environment:
    name: $DEPLOY_ENVIRONMENT
  script:
    - . .ci-venv/bin/activate
    - python ci-cd/pipeline.py deploy --tag "$IMAGE_TAG"
